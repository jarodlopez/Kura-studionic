<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KURA STUDIO | Dark Japan Punk</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { kuraRed: '#ff003c', kuraDark: '#050505', kuraGrey: '#111' },
                    fontFamily: { bebas: ['"Bebas Neue"', 'sans-serif'], mono: ['"Space Mono"', 'monospace'] },
                    animation: {
                        'progress': 'progress 5s linear infinite',
                        'slideUp': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
                        'marquee': 'marquee 15s linear infinite',
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite'
                    },
                    keyframes: {
                        progress: { '0%': { width: '0%' }, '100%': { width: '100%' } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: 0 }, '100%': { transform: 'translateY(0)', opacity: 1 } },
                        marquee: { '0%': { transform: 'translateX(100%)' }, '100%': { transform: 'translateX(-100%)' } }
                    }
                }
            }
        }
    </script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        body { 
            background-color: #000; color: #fff; 
            background-image: linear-gradient(rgba(255, 0, 60, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 0, 60, 0.04) 1px, transparent 1px);
            background-size: 40px 40px; overscroll-behavior-y: none;
        }
        .brutalist-card { border: 2px solid #222; background: #050505; transition: all 0.2s ease; }
        .brutalist-card:hover { border-color: #ff003c; transform: translate(-4px, -4px); box-shadow: 6px 6px 0px 0px #ff003c; }
        .brutalist-btn { background: #ff003c; color: #000; border: 2px solid #ff003c; transition: all 0.2s ease; text-transform: uppercase; }
        .brutalist-btn:hover { background: #000; color: #ff003c; box-shadow: 4px 4px 0px 0px #ff003c; }
        .brutalist-btn-outline { background: #000; color: #fff; border: 2px solid #333; transition: all 0.2s ease; }
        .brutalist-btn-outline:hover, .brutalist-btn-outline.active { border-color: #ff003c; color: #ff003c; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff003c; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .text-outline { -webkit-text-stroke: 1px #ff003c; color: transparent; }
        
        .marquee-container {
            width: 100%; overflow: hidden; white-space: nowrap; background-color: #ff003c; color: #000; padding: 4px 0; position: relative;
        }
        .marquee-content { display: inline-block; min-width: 100%; }
    </style>
</head>
<body class="font-mono">
    <div id="root"></div>

    <script type="text/babel">
        // --- 1. CONFIGURACIÓN FIREBASE REAL (Tu Proyecto) ---
        const firebaseConfig = {
            apiKey: "AIzaSyB6YA-gSckDvi-fdFlRsvwRttr3VnGQ82U",
            authDomain: "kuranic-b1034.firebaseapp.com",
            projectId: "kuranic-b1034",
            storageBucket: "kuranic-b1034.firebasestorage.app",
            messagingSenderId: "875987360513",
            appId: "1:875987360513:web:cd51507c7b33f302949900"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        // --- HERO SLIDES (Estos se pueden dejar estáticos o mover a Firebase después) ---
        const HERO_SLIDES = [
            { id: 1, image: 'https://images.unsplash.com/photo-1605518216938-7c31b7b14ad0?auto=format&fit=crop&q=80&w=1600', subtitle: 'NUEVA COLECCIÓN', title: 'DARK PUNK // VOL. 1', cta: 'VER HOODIES' },
            { id: 2, image: 'https://images.unsplash.com/photo-1511556532299-8f662fc26c06?auto=format&fit=crop&q=80&w=1600', subtitle: 'BÁSICOS ESENCIALES', title: 'TOKYO STREETWEAR', cta: 'VER T-SHIRTS' }
        ];

        // --- COMPONENTES SECUNDARIOS ---
        const Toast = ({ message, isVisible }) => (
            <div className={`fixed bottom-4 left-1/2 -translate-x-1/2 z-[150] transition-all duration-300 ${isVisible ? 'translate-y-0 opacity-100' : 'translate-y-20 opacity-0 pointer-events-none'}`}>
                <div className="bg-kuraRed text-black font-bebas px-6 py-3 text-xl border-2 border-black flex items-center gap-3 shadow-[0_10px_40px_rgba(255,0,60,0.3)]">
                    <span className="text-2xl">✓</span> {message}
                </div>
            </div>
        );

        const Accordion = ({ title, children }) => {
            const [isOpen, setIsOpen] = useState(false);
            return (
                <div className="border-b border-zinc-800">
                    <button onClick={() => setIsOpen(!isOpen)} className="w-full flex justify-between items-center py-4 font-mono text-xs md:text-sm text-zinc-300 hover:text-kuraRed transition-colors">
                        {title}
                        <span className="text-xl leading-none">{isOpen ? '−' : '+'}</span>
                    </button>
                    <div className={`overflow-hidden transition-all duration-300 font-mono text-xs text-zinc-500 ${isOpen ? 'max-h-40 pb-4' : 'max-h-0'}`}>
                        {children}
                    </div>
                </div>
            );
        };

        // --- APLICACIÓN PRINCIPAL ---
        function KuraStudio() {
            const [products, setProducts] = useState([]);
            const [filteredProducts, setFilteredProducts] = useState([]);
            const [isLoading, setIsLoading] = useState(true); // Nuevo estado de carga
            
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [activeCategory, setActiveCategory] = useState('ALL');
            const [sortBy, setSortBy] = useState('NEWEST');
            
            const [selectedSize, setSelectedSize] = useState('');
            const [mainImageIndex, setMainImageIndex] = useState(0);
            
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [toastMsg, setToastMsg] = useState('');
            const [formData, setFormData] = useState({ name: '', phone: '', address: '' });
            const [currentHeroSlide, setCurrentHeroSlide] = useState(0);

            const [cart, setCart] = useState(() => {
                try { return JSON.parse(localStorage.getItem('kura_cart')) || []; } 
                catch (e) { return []; }
            });

            useEffect(() => { localStorage.setItem('kura_cart', JSON.stringify(cart)); }, [cart]);

            // LECTURA DE FIREBASE REAL
            useEffect(() => {
                const fetchProducts = async () => {
                    setIsLoading(true);
                    try {
                        const snapshot = await db.collection("products").get();
                        if (!snapshot.empty) {
                            const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setProducts(items); 
                            setFilteredProducts(items);
                            checkDynamicLink(items);
                        } else {
                            // Base de datos conectada pero vacía
                            setProducts([]);
                            setFilteredProducts([]);
                        }
                    } catch (error) { 
                        console.error("Error conectando a Firebase:", error);
                        setProducts([]);
                        setFilteredProducts([]);
                    } finally {
                        setIsLoading(false);
                    }
                };
                fetchProducts();
            }, []);

            useEffect(() => {
                if (selectedProduct) return;
                const timer = setInterval(() => {
                    setCurrentHeroSlide((prev) => (prev + 1) % HERO_SLIDES.length);
                }, 5000);
                return () => clearInterval(timer);
            }, [selectedProduct]);

            useEffect(() => {
                let result = [...products];
                if (activeCategory !== 'ALL') {
                    result = result.filter(p => p.category === activeCategory);
                }
                if (sortBy === 'PRICE_ASC') result.sort((a, b) => a.price - b.price);
                if (sortBy === 'PRICE_DESC') result.sort((a, b) => b.price - a.price);
                setFilteredProducts(result);
            }, [activeCategory, sortBy, products]);

            const checkDynamicLink = (items) => {
                const id = new URLSearchParams(window.location.search).get('product');
                if (id) {
                    const found = items.find(p => p.id === id);
                    if (found) openProduct(found);
                }
            };

            const openProduct = (product) => {
                if(!product) return;
                setSelectedProduct(product);
                setSelectedSize('');
                setMainImageIndex(0);
                window.history.pushState(null, '', `?product=${product.id}`);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const closeProduct = () => {
                setSelectedProduct(null);
                window.history.pushState(null, '', window.location.pathname);
            };

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 3000);
            };

            const addToCart = (product) => {
                if (!selectedSize) { alert('SELECCIONA UNA TALLA'); return; }
                const newItem = { ...product, selectedSize, cartId: Date.now() };
                setCart([...cart, newItem]);
                showToast(`AGREGADO: ${product.title} [${selectedSize}]`);
            };

            const removeFromCart = (cartId) => setCart(cart.filter(item => item.cartId !== cartId));
            const totalCart = cart.reduce((acc, item) => acc + item.price, 0);

            const handleCheckout = (e) => {
                e.preventDefault();
                if (cart.length === 0) return;
                let m = `*PEDIDO KURA STUDIO* 🩸%0A%0A*Cliente:* ${formData.name}%0A*Tel:* ${formData.phone}%0A*Dirección:* ${formData.address}%0A%0A*ARSENAL:*%0A`;
                cart.forEach(i => { m += `▪️ ${i.title} (${i.selectedSize}) - NIO ${i.price}%0A`; });
                m += `%0A*TOTAL: NIO ${totalCart}*`;
                setCart([]); localStorage.removeItem('kura_cart'); setIsCartOpen(false);
                window.open(`https://wa.me/50587091008?text=${m}`, '_blank');
            };

            // Evitar crash si no hay categorías aún
            const categories = ['ALL', ...Array.from(new Set(products.map(p => p.category || 'UNKNOWN')))];

            return (
                <div className="min-h-screen relative flex flex-col font-mono text-sm">
                    {/* FONDO KANJI DECORATIVO */}
                    <div className="fixed inset-0 flex items-center justify-center opacity-[0.02] pointer-events-none z-0 overflow-hidden">
                        <span className="font-bebas text-[30rem] leading-none text-white writing-vertical-rl whitespace-nowrap">クラスタジオ</span>
                    </div>

                    <Toast message={toastMsg} isVisible={!!toastMsg} />

                    <div className="relative z-10 w-full flex-1 flex flex-col">
                        
                        {/* ANIMATED MARQUEE TOP BAR (Letrero LED) */}
                        <div className="marquee-container font-bebas text-lg tracking-[0.2em]">
                            <div className="marquee-content animate-marquee">
                                ENVÍOS A TODA NICARAGUA // PAGO CONTRA ENTREGA // KURA STUDIO // CALIDAD PREMIUM // ENVÍOS A TODA NICARAGUA // PAGO CONTRA ENTREGA // KURA STUDIO // CALIDAD PREMIUM //
                            </div>
                        </div>

                        {/* MAIN NAVBAR STICKY */}
                        <header className="px-4 md:px-8 py-4 flex justify-between items-center border-b border-zinc-900 bg-black/90 backdrop-blur-md sticky top-0 z-50">
                            <div className="cursor-pointer" onClick={closeProduct}>
                                <h1 className="text-3xl md:text-5xl font-bebas tracking-wider leading-none m-0">
                                    KURA<span className="text-outline">STUDIO</span>
                                </h1>
                            </div>
                            <button onClick={() => setIsCartOpen(true)} className="brutalist-card px-4 py-2 font-bold flex items-center gap-2 hover:bg-white hover:text-black">
                                <span className="w-2 h-2 bg-kuraRed rounded-full animate-pulse"></span>
                                CART [{cart.length}]
                            </button>
                        </header>

                        <div className="flex-1 w-full max-w-[1440px] mx-auto">
                            {isLoading ? (
                                /* PANTALLA DE CARGA BRUTALISTA */
                                <div className="flex flex-col items-center justify-center h-[60vh]">
                                    <div className="text-kuraRed text-6xl mb-4 animate-pulse-fast">⚡</div>
                                    <p className="font-bebas text-3xl tracking-widest text-white">CONECTANDO AL SERVIDOR...</p>
                                    <p className="text-zinc-600 text-xs mt-2">CARGANDO DATOS DE KURA STUDIO</p>
                                </div>
                            ) : !selectedProduct ? (
                                /* ===================== VISTA: HOME & CATÁLOGO ===================== */
                                <div className="animate-slideUp pb-20">
                                    
                                    {/* HERO SLIDER SECTION */}
                                    <div className="relative w-full h-[50vh] md:h-[70vh] bg-kuraGrey overflow-hidden border-b-2 border-zinc-900 group">
                                        {HERO_SLIDES.map((slide, index) => (
                                            <div key={slide.id} className={`absolute inset-0 transition-opacity duration-1000 ${index === currentHeroSlide ? 'opacity-100 z-10' : 'opacity-0 z-0'}`}>
                                                <div className="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent z-10"></div>
                                                <img src={slide.image} alt="Hero" className="w-full h-full object-cover scale-105 transform transition-transform duration-[10000ms] ease-linear group-hover:scale-100" />
                                                <div className="absolute bottom-10 left-4 md:left-12 z-20">
                                                    <p className="text-kuraRed font-mono text-xs md:text-sm tracking-[0.3em] mb-2">{slide.subtitle}</p>
                                                    <h2 className="text-5xl md:text-8xl font-bebas text-white leading-none mb-6 text-outline md:-webkit-text-stroke-[2px]">{slide.title}</h2>
                                                    <button onClick={() => window.scrollTo({top: window.innerHeight * 0.7, behavior: 'smooth'})} className="brutalist-btn px-8 py-3 font-bebas text-2xl tracking-widest">
                                                        {slide.cta}
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                        <div className="absolute bottom-0 left-0 w-full flex h-1 z-30 bg-zinc-900">
                                            {HERO_SLIDES.map((_, i) => (
                                                <div key={i} className="flex-1 relative">
                                                    {i === currentHeroSlide && <div className="absolute top-0 left-0 h-full bg-kuraRed animate-progress"></div>}
                                                    {i < currentHeroSlide && <div className="absolute top-0 left-0 h-full w-full bg-zinc-500"></div>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* FILTROS Y ORDENAMIENTO */}
                                    <div className="px-4 md:px-8 py-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-zinc-900 sticky top-[72px] bg-black/95 z-40">
                                        <div className="flex gap-2 overflow-x-auto no-scrollbar w-full md:w-auto pb-2 md:pb-0">
                                            {categories.map(cat => (
                                                <button key={cat} onClick={() => setActiveCategory(cat)} 
                                                    className={`brutalist-btn-outline px-4 py-1 text-xs whitespace-nowrap ${activeCategory === cat ? 'active' : ''}`}>
                                                    {cat}
                                                </button>
                                            ))}
                                        </div>
                                        <div className="flex items-center gap-2 w-full md:w-auto">
                                            <span className="text-zinc-500 text-xs hidden md:inline">ORDENAR POR:</span>
                                            <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} className="bg-black border border-zinc-700 text-white text-xs p-2 focus:border-kuraRed outline-none w-full md:w-auto cursor-pointer appearance-none rounded-none">
                                                <option value="NEWEST">MÁS RECIENTES</option>
                                                <option value="PRICE_ASC">PRECIO: MENOR A MAYOR</option>
                                                <option value="PRICE_DESC">PRECIO: MAYOR A MENOR</option>
                                            </select>
                                        </div>
                                    </div>

                                    {/* GRID DE PRODUCTOS */}
                                    <main className="p-4 md:p-8 grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-8">
                                        {filteredProducts.map(product => (
                                            <div key={product.id} className="brutalist-card flex flex-col group cursor-pointer" onClick={() => openProduct(product)}>
                                                <div className="relative w-full aspect-[4/5] bg-kuraGrey overflow-hidden border-b border-zinc-800">
                                                    {/* Soporte para arrays de imágenes o imagen única string */}
                                                    <img src={Array.isArray(product.images) ? product.images[0] : (product.image || '')} className="absolute inset-0 w-full h-full object-cover transition-opacity duration-300 group-hover:opacity-0" />
                                                    {(Array.isArray(product.images) && product.images[1]) && <img src={product.images[1]} className="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-300 group-hover:opacity-100" />}
                                                    
                                                    <div className="absolute top-2 left-2 bg-white text-black font-bebas px-2 py-0.5 text-sm z-10">{product.category}</div>
                                                </div>
                                                <div className="p-4 flex flex-col flex-1">
                                                    <h2 className="text-xl md:text-2xl font-bebas tracking-wide leading-tight mb-1">{product.title}</h2>
                                                    <p className="text-kuraRed font-bold font-mono text-sm mt-auto pt-2">NIO {product.price}</p>
                                                </div>
                                            </div>
                                        ))}
                                        {filteredProducts.length === 0 && (
                                            <div className="col-span-full text-center py-20">
                                                <p className="font-bebas text-3xl text-zinc-600 mb-2">BASE DE DATOS ESPERANDO DATOS</p>
                                                <p className="text-zinc-500 text-xs">Carga prendas desde el panel de administración para verlas aquí.</p>
                                            </div>
                                        )}
                                    </main>
                                </div>

                            ) : (

                                /* ===================== VISTA: PRODUCTO INDIVIDUAL ===================== */
                                <div className="animate-slideUp pb-32 md:pb-20 p-4 md:p-8">
                                    <div className="flex gap-2 text-xs text-zinc-500 mb-6 font-mono uppercase">
                                        <span className="cursor-pointer hover:text-white" onClick={closeProduct}>INICIO</span> / 
                                        <span className="cursor-pointer hover:text-white" onClick={() => { setActiveCategory(selectedProduct.category); closeProduct(); }}>{selectedProduct.category}</span> / 
                                        <span className="text-kuraRed">{selectedProduct.title}</span>
                                    </div>

                                    <div className="flex flex-col md:flex-row gap-6 md:gap-12 lg:gap-20">
                                        
                                        {/* LADO IZQUIERDO: GALERÍA DE IMÁGENES */}
                                        <div className="w-full md:w-[55%] flex flex-col-reverse md:flex-row gap-4">
                                            {/* Miniaturas (si es array) */}
                                            {Array.isArray(selectedProduct.images) && selectedProduct.images.length > 1 && (
                                                <div className="flex md:flex-col gap-3 overflow-x-auto no-scrollbar md:w-24 shrink-0">
                                                    {selectedProduct.images.map((img, idx) => (
                                                        <button key={idx} onClick={() => setMainImageIndex(idx)} className={`w-20 h-24 md:w-full md:h-32 shrink-0 border-2 transition-colors overflow-hidden ${mainImageIndex === idx ? 'border-kuraRed' : 'border-zinc-800 hover:border-zinc-500'}`}>
                                                            <img src={img} className="w-full h-full object-cover" />
                                                        </button>
                                                    ))}
                                                </div>
                                            )}
                                            {/* Imagen Principal */}
                                            <div className="w-full bg-kuraGrey border border-zinc-800 relative">
                                                <img src={Array.isArray(selectedProduct.images) ? selectedProduct.images[mainImageIndex] : selectedProduct.image} alt={selectedProduct.title} className="w-full h-auto aspect-[4/5] object-cover" />
                                            </div>
                                        </div>

                                        {/* LADO DERECHO: INFO Y COMPRA */}
                                        <div className="w-full md:w-[45%] flex flex-col">
                                            <h2 className="text-4xl md:text-6xl font-bebas mb-2 leading-none">{selectedProduct.title}</h2>
                                            <p className="text-2xl font-mono text-kuraRed mb-6">NIO {selectedProduct.price}</p>
                                            
                                            <p className="text-zinc-400 text-sm leading-relaxed mb-8">{selectedProduct.description}</p>

                                            {/* Selección de Talla */}
                                            {selectedProduct.sizes && selectedProduct.sizes.length > 0 && (
                                                <div className="mb-8">
                                                    <div className="flex justify-between items-end mb-3">
                                                        <span className="text-xs text-zinc-300">TALLA // SIZE</span>
                                                        <span className="text-[10px] text-zinc-500 underline cursor-pointer hover:text-white">GUÍA DE MEDIDAS</span>
                                                    </div>
                                                    <div className="grid grid-cols-4 gap-2">
                                                        {selectedProduct.sizes.map(size => (
                                                            <button key={size} onClick={() => setSelectedSize(size)}
                                                                className={`py-3 font-bebas text-xl border transition-all ${selectedSize === size ? 'bg-white text-black border-white' : 'bg-transparent border-zinc-700 hover:border-kuraRed'}`}>
                                                                {size}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            <button onClick={() => addToCart(selectedProduct)} className="brutalist-btn w-full font-bebas text-2xl md:text-3xl py-4 mb-8">
                                                {selectedSize || !selectedProduct.sizes ? 'AGREGAR AL ARSENAL' : 'SELECCIONA TALLA'}
                                            </button>

                                            {/* Acordeones de Info Extra */}
                                            <div className="border-t border-zinc-800 pt-4">
                                                {selectedProduct.details && selectedProduct.details.length > 0 && (
                                                    <Accordion title="ESPECIFICACIONES TÉCNICAS">
                                                        <ul className="list-disc pl-4 space-y-1">
                                                            {selectedProduct.details.map((d, i) => <li key={i}>{d}</li>)}
                                                        </ul>
                                                    </Accordion>
                                                )}
                                                <Accordion title="ENVÍOS Y ENTREGAS">
                                                    Entregas en Managua en 24h. Envíos a departamentos por CargoTrans (2-3 días hábiles). Pago contra entrega disponible.
                                                </Accordion>
                                                <Accordion title="CUIDADO DE LA PRENDA">
                                                    Lavar a máquina con agua fría. Voltear al revés antes de lavar. No usar plancha sobre el gráfico. Secar a la sombra.
                                                </Accordion>
                                            </div>
                                        </div>
                                    </div>

                                    {/* STICKY BOTÓN ADD TO CART EN MÓVIL */}
                                    <div className="fixed bottom-0 left-0 w-full p-4 bg-black/90 border-t border-zinc-800 backdrop-blur-md z-40 md:hidden animate-slideUp">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="font-bebas text-xl truncate">{selectedProduct.title}</span>
                                            <span className="text-kuraRed font-bold">NIO {selectedProduct.price}</span>
                                        </div>
                                        <button onClick={() => addToCart(selectedProduct)} className="brutalist-btn w-full font-bebas text-xl py-3">
                                            AGREGAR AL ARSENAL
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* ===================== SLIDE-OVER CARRITO ===================== */}
                    {isCartOpen && (
                        <div className="fixed inset-0 z-[200] flex justify-end">
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                            <div className="h-full w-full md:w-[400px] bg-kuraDark border-l border-zinc-800 flex flex-col relative animate-[slideInRight_0.3s_ease]">
                                <div className="p-5 border-b border-zinc-800 flex justify-between items-center bg-black">
                                    <h2 className="text-2xl font-bebas tracking-widest flex items-center gap-2"><span className="w-2 h-2 bg-kuraRed block"></span> CARRITO</h2>
                                    <button onClick={() => setIsCartOpen(false)} className="text-zinc-500 hover:text-white">✕ CERRAR</button>
                                </div>

                                <div className="flex-1 overflow-y-auto no-scrollbar p-5 space-y-4">
                                    {cart.length === 0 ? (
                                        <div className="text-center mt-20">
                                            <p className="text-zinc-500 text-xs mb-4 uppercase">Tu arsenal está vacío.</p>
                                            <button onClick={() => setIsCartOpen(false)} className="brutalist-btn-outline px-6 py-2 text-xs">VOLVER A LA TIENDA</button>
                                        </div>
                                    ) : (
                                        cart.map(item => (
                                            <div key={item.cartId} className="flex gap-4 border border-zinc-800 p-2 relative group bg-black">
                                                <img src={Array.isArray(item.images) ? item.images[0] : item.image} className="w-20 h-24 object-cover" />
                                                <div className="flex flex-col justify-center">
                                                    <p className="font-bebas text-xl leading-none mb-1 pr-6">{item.title}</p>
                                                    <p className="text-zinc-500 text-[10px]">TALLA: {item.selectedSize}</p>
                                                    <p className="text-kuraRed text-xs mt-2">NIO {item.price}</p>
                                                </div>
                                                <button onClick={() => removeFromCart(item.cartId)} className="absolute top-2 right-2 text-zinc-600 hover:text-kuraRed text-lg">✕</button>
                                            </div>
                                        ))
                                    )}
                                </div>

                                {cart.length > 0 && (
                                    <div className="p-5 bg-black border-t border-zinc-800">
                                        <div className="flex justify-between items-end mb-4 border-b border-zinc-800 pb-4">
                                            <span className="text-zinc-400 text-xs">SUBTOTAL ESTIMADO</span>
                                            <span className="font-bebas text-3xl text-white">NIO {totalCart}</span>
                                        </div>
                                        <form onSubmit={handleCheckout} className="space-y-3">
                                            <input required type="text" placeholder="NOMBRE COMPLETO" className="w-full bg-kuraDark border border-zinc-800 text-white p-3 text-xs focus:border-kuraRed outline-none" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} />
                                            <input required type="tel" placeholder="NÚMERO DE TELÉFONO" className="w-full bg-kuraDark border border-zinc-800 text-white p-3 text-xs focus:border-kuraRed outline-none" value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value})} />
                                            <textarea required placeholder="DIRECCIÓN EXACTA DE ENTREGA" className="w-full bg-kuraDark border border-zinc-800 text-white p-3 text-xs focus:border-kuraRed outline-none h-16 resize-none" value={formData.address} onChange={(e) => setFormData({...formData, address: e.target.value})} />
                                            <p className="text-[9px] text-zinc-500 leading-tight">Al procesar el pedido, serás redirigido a WhatsApp para confirmar con un agente humano.</p>
                                            <button type="submit" className="brutalist-btn w-full py-4 text-xl font-bebas mt-2">CONFIRMAR PEDIDO</button>
                                        </form>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KuraStudio />);
    </script>
    <style>
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</body>
</html>
