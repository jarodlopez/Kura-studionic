<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KURA STUDIO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { kuraRed: '#ff003c', kuraDark: '#050505', kuraGrey: '#111' }, 
                    fontFamily: { bebas: ['"Bebas Neue"', 'sans-serif'], mono: ['"Space Mono"', 'monospace'] }, 
                    animation: { 'slideUp': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)', 'marquee': 'marquee 15s linear infinite' }, 
                    keyframes: { slideUp: { '0%': { transform: 'translateY(20px)', opacity: 0 }, '100%': { transform: 'translateY(0)', opacity: 1 } }, marquee: { '0%': { transform: 'translateX(100%)' }, '100%': { transform: 'translateX(-100%)' } } } 
                } 
            } 
        }
    </script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { background-color: #000; color: #fff; background-image: linear-gradient(rgba(255, 0, 60, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 0, 60, 0.04) 1px, transparent 1px); background-size: 40px 40px; overscroll-behavior-y: none; }
        .brutalist-card { border: 2px solid #222; background: #050505; transition: all 0.2s ease; }
        .brutalist-card:hover { border-color: #ff003c; transform: translate(-4px, -4px); box-shadow: 6px 6px 0px 0px #ff003c; }
        .brutalist-btn { background: #ff003c; color: #000; border: 2px solid #ff003c; transition: all 0.2s ease; text-transform: uppercase; }
        .brutalist-btn:hover:not(:disabled) { background: #000; color: #ff003c; box-shadow: 4px 4px 0px 0px #ff003c; }
        .brutalist-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .brutalist-btn-outline { background: #000; color: #fff; border: 2px solid #333; transition: all 0.2s ease; }
        .brutalist-btn-outline:hover, .brutalist-btn-outline.active { border-color: #ff003c; color: #ff003c; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #000; } ::-webkit-scrollbar-thumb { background: #333; } ::-webkit-scrollbar-thumb:hover { background: #ff003c; }
        .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .text-outline { -webkit-text-stroke: 1px #ff003c; color: transparent; }
        .marquee-container { width: 100%; overflow: hidden; white-space: nowrap; background-color: #ff003c; color: #000; padding: 4px 0; position: relative; }
        .marquee-content { display: inline-block; min-width: 100%; }
        .img-fade { opacity: 0; transition: opacity 0.5s ease-in-out; }
        .img-loaded { opacity: 1; }
    </style>
</head>
<body class="font-mono">
    <div id="root"></div>
    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyB6YA-gSckDvi-fdFlRsvwRttr3VnGQ82U",
            authDomain: "kuranic-b1034.firebaseapp.com",
            projectId: "kuranic-b1034"
        };
        const IMGBB_API_KEY = "B922654effe3a1ab5ac85cc4c23f97b8";

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        
        const { useState, useEffect } = React;

        const uploadToImgBB = async (file) => {
            const fd = new FormData();
            fd.append("image", file);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
            const data = await res.json();
            if (data.success) return data.data.url;
            throw new Error("Error subiendo imagen a ImgBB");
        };

        const Toast = ({ message, isVisible }) => (
            <div className={`fixed bottom-4 left-1/2 -translate-x-1/2 z-[150] transition-all duration-300 ${isVisible ? 'translate-y-0 opacity-100' : 'translate-y-20 opacity-0 pointer-events-none'}`}>
                <div className="bg-kuraRed text-black font-bebas px-6 py-3 text-xl border-2 border-black flex items-center gap-3 shadow-[4px_4px_0_white]"><span className="text-2xl">✓</span> {message}</div>
            </div>
        );

        const SmoothImage = ({ src, className }) => (
            <img src={src} className={`img-fade ${className}`} onLoad={(e) => e.target.classList.add('img-loaded')} alt="Kura Studio" />
        );

        function KuraStudio() {
            const [products, setProducts] = useState([]);
            const [filteredProducts, setFilteredProducts] = useState([]);
            const [storeConfig, setStoreConfig] = useState({ heroSlides: [] });
            const [isLoading, setIsLoading] = useState(true);
            
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [activeCategory, setActiveCategory] = useState('ALL');
            const [selectedSize, setSelectedSize] = useState('');
            const [mainImageIndex, setMainImageIndex] = useState(0);
            
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isSizeModalOpen, setIsSizeModalOpen] = useState(false);
            const [toastMsg, setToastMsg] = useState('');
            const [formData, setFormData] = useState({ name: '', phone: '', address: '' });
            const [currentHeroSlide, setCurrentHeroSlide] = useState(0);

            // Estados de envío y pago
            const [shippingZone, setShippingZone] = useState('managua'); 
            const [receiptFile, setReceiptFile] = useState(null);
            const [isUploading, setIsUploading] = useState(false);
            const [acceptTerms, setAcceptTerms] = useState(false);

            // Caché del carrito
            const [cart, setCart] = useState(() => { try { return JSON.parse(localStorage.getItem('kura_cart')) || []; } catch (e) { return []; } });
            useEffect(() => { localStorage.setItem('kura_cart', JSON.stringify(cart)); }, [cart]);

            // Caché de orden pendiente
            const [pendingOrder, setPendingOrder] = useState(() => { try { return JSON.parse(localStorage.getItem('kura_pending_order')) || null; } catch (e) { return null; } });
            useEffect(() => { 
                if(pendingOrder) localStorage.setItem('kura_pending_order', JSON.stringify(pendingOrder)); 
                else localStorage.removeItem('kura_pending_order');
            }, [pendingOrder]);

            // Función Helper para obtener precio real (aplicando descuento si existe)
            const getPrice = (product) => {
                return product.discountPrice && product.discountPrice > 0 ? product.discountPrice : product.price;
            };

            // Cálculo de totales
            const shippingRates = { managua: 100, departamentos: 165 };
            const currentShippingCost = shippingRates[shippingZone] || 0;
            const cartSubtotal = cart.reduce((a, b) => a + getPrice(b), 0);
            const cartTotal = cartSubtotal + (cart.length > 0 ? currentShippingCost : 0);

            useEffect(() => {
                const fetchData = async () => {
                    setIsLoading(true);
                    try {
                        const prodSnap = await db.collection("products").get();
                        const items = prodSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setProducts(items); setFilteredProducts(items);
                        
                        const confSnap = await db.collection("settings").doc("store").get();
                        if(confSnap.exists) setStoreConfig(confSnap.data());

                        checkDynamicLink(items);
                    } catch (error) { console.error("Error conectando al sistema", error); }
                    setIsLoading(false);
                };
                fetchData();
            }, []);

            useEffect(() => {
                if (selectedProduct || !storeConfig.heroSlides || storeConfig.heroSlides.length <= 1) return;
                const timer = setInterval(() => setCurrentHeroSlide((prev) => (prev + 1) % storeConfig.heroSlides.length), 5000);
                return () => clearInterval(timer);
            }, [selectedProduct, storeConfig.heroSlides]);

            useEffect(() => {
                let result = [...products];
                if (activeCategory !== 'ALL') result = result.filter(p => p.category === activeCategory);
                setFilteredProducts(result);
            }, [activeCategory, products]);

            const checkDynamicLink = (items) => {
                const id = new URLSearchParams(window.location.search).get('product');
                if (id) { const found = items.find(p => p.id === id); if (found) openProduct(found); }
            };

            const openProduct = (product) => {
                setSelectedProduct(product); setSelectedSize(''); setMainImageIndex(0);
                window.history.pushState(null, '', `?product=${product.id}`); window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const closeProduct = () => { setSelectedProduct(null); window.history.pushState(null, '', window.location.pathname); };

            const addToCart = (product) => {
                if (!selectedSize && product.sizes?.length > 0) return alert('SELECCIONA UNA TALLA PARA CONTINUAR');
                const sizeToSave = selectedSize || 'ÚNICA';
                setCart([...cart, { ...product, selectedSize: sizeToSave, cartId: Date.now() }]);
                setToastMsg(`AGREGADO: ${product.title}`); setTimeout(() => setToastMsg(''), 3000);
            };

            // PASO 1: Generar orden
            const handleProceedToPayment = (e) => {
                e.preventDefault();
                if (cart.length === 0) return;
                
                const orderNum = `KURA-${Math.floor(100000 + Math.random() * 900000)}`;
                const orderData = {
                    orderNumber: orderNum,
                    customer: formData,
                    items: cart,
                    subtotal: cartSubtotal,
                    shippingZone: shippingZone === 'managua' ? 'Managua' : 'Departamentos',
                    shippingCost: currentShippingCost,
                    total: cartTotal,
                    date: new Date().toISOString()
                };
                setPendingOrder(orderData);
            };

            // PASO 2: Sincronización API (HubSpot + Telegram)
            const syncToHubSpot = async (orderData) => {
                try {
                    const detalles = orderData.items.map(i => `${i.title} (Talla: ${i.selectedSize})`).join(' | ');
                    
                    await fetch('/api/hubspot', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            orderNumber: orderData.orderNumber,
                            name: orderData.customer.name,
                            phone: orderData.customer.phone,
                            address: `${orderData.customer.address} (${orderData.shippingZone})`,
                            total: orderData.total,
                            orderDetails: detalles
                        })
                    });
                    console.log("Sincronizado con APIs correctamente");
                } catch (error) { console.error("Error conectando con API", error); }
            };

            // PASO 3: Finalizar compra
            const handleFinalizeOrder = async () => {
                if (!receiptFile) return alert("Por favor, adjunta tu comprobante de pago.");
                setIsUploading(true);

                try {
                    // Subir recibo
                    const receiptUrl = await uploadToImgBB(receiptFile);

                    const finalOrder = {
                        ...pendingOrder,
                        receiptUrl,
                        status: 'paid_pending_verification'
                    };

                    // Guardar en DB
                    await db.collection("orders").doc(pendingOrder.orderNumber).set(finalOrder);

                    // Sincronizar CRM y disparar Telegram
                    syncToHubSpot(finalOrder);

                    // Construir mensaje limpio con saltos de línea (\n)
                    let m = `*NUEVA ORDEN: #${pendingOrder.orderNumber}* 🩸\n\n`;
                    m += `*Cliente:* ${pendingOrder.customer.name}\n`;
                    m += `*Tel:* ${pendingOrder.customer.phone}\n`;
                    m += `*Dirección:* ${pendingOrder.customer.address} (${pendingOrder.shippingZone})\n\n`;
                    m += `*ARSENAL:*\n`;
                    pendingOrder.items.forEach(i => { 
                        const itemPrice = getPrice(i);
                        m += `▪️ ${i.title} (${i.selectedSize}) - NIO ${itemPrice}\n`; 
                    });
                    m += `\n*Subtotal:* NIO ${pendingOrder.subtotal}\n`;
                    m += `*Envío:* NIO ${pendingOrder.shippingCost}\n`;
                    m += `*TOTAL PAGADO:* NIO ${pendingOrder.total}\n\n`;
                    m += `*Comprobante Adjunto:* ${receiptUrl}`;

                    const encodedMessage = encodeURIComponent(m);

                    // Limpiar datos y cerrar modal
                    setCart([]);
                    setPendingOrder(null);
                    setReceiptFile(null);
                    setAcceptTerms(false);
                    setIsCartOpen(false);
                    
                    window.open(`https://wa.me/50587091008?text=${encodedMessage}`, '_blank');
                    
                } catch (error) {
                    alert("Ocurrió un error al procesar el pago. Verifica tu conexión e intenta de nuevo.");
                }
                setIsUploading(false);
            };

            const categories = ['ALL', ...Array.from(new Set(products.map(p => p.category || 'UNKNOWN')))];

            return (
                <div className="min-h-screen relative flex flex-col font-mono text-sm bg-black">
                    <Toast message={toastMsg} isVisible={!!toastMsg} />

                    <div className="marquee-container font-bebas text-lg tracking-[0.2em] z-50">
                        <div className="marquee-content animate-marquee">REAL DROP FOR REAL FANS // ENTREGAS DE 24 a 72 HORAS // REAL DROP FOR REAL FANS // ENTREGAS DE 24 a 72 HORAS // REAL DROP FOR REAL FANS //</div>
                    </div>

                    <header className="px-4 md:px-8 py-4 flex justify-between items-center border-b border-zinc-900 bg-black/95 backdrop-blur-md sticky top-0 z-40">
                        <div className="cursor-pointer" onClick={closeProduct}>
                            <h1 className="text-3xl md:text-5xl font-bebas tracking-wider leading-none m-0">KURA<span className="text-outline">STUDIO</span></h1>
                        </div>
                        <button onClick={() => setIsCartOpen(true)} className="brutalist-card px-4 py-2 font-bold flex items-center gap-2 relative text-xs md:text-sm">
                            {pendingOrder && <span className="absolute -top-1 -right-1 flex h-3 w-3"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-kuraRed opacity-75"></span><span className="relative inline-flex rounded-full h-3 w-3 bg-kuraRed"></span></span>}
                            <span className="w-2 h-2 bg-kuraRed rounded-full animate-pulse"></span> CARRITO [{cart.length}]
                        </button>
                    </header>

                    <div className="flex-1 w-full max-w-[1440px] mx-auto">
                        {isLoading ? (
                            <div className="flex flex-col items-center justify-center h-[70vh] bg-black">
                                <h1 className="text-4xl md:text-6xl font-bebas text-zinc-800 animate-pulse">CARGANDO SISTEMA...</h1>
                            </div>
                        ) : !selectedProduct ? (
                            
                            // CATÁLOGO
                            <div className="animate-slideUp pb-20">
                                {storeConfig.heroSlides && storeConfig.heroSlides.length > 0 && (
                                    <div className="relative w-full h-[50vh] md:h-[70vh] bg-kuraDark overflow-hidden border-b-2 border-zinc-900">
                                        {storeConfig.heroSlides.map((slide, index) => (
                                            <div key={slide.id} className={`absolute inset-0 transition-opacity duration-1000 ${index === currentHeroSlide ? 'opacity-100 z-10' : 'opacity-0 z-0'}`}>
                                                <div className="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-transparent z-10"></div>
                                                <SmoothImage src={slide.image} className="w-full h-full object-cover scale-105" />
                                                <div className="absolute bottom-10 left-4 md:left-12 z-20">
                                                    <p className="text-kuraRed font-mono text-xs md:text-sm tracking-[0.3em] mb-2">{slide.subtitle}</p>
                                                    <h2 className="text-5xl md:text-8xl font-bebas text-white leading-none mb-6">{slide.title}</h2>
                                                    <button 
                                                        onClick={() => {
                                                            if(slide.categoryTarget) setActiveCategory(slide.categoryTarget);
                                                            window.scrollTo({top: window.innerHeight * 0.7, behavior: 'smooth'});
                                                        }} 
                                                        className="brutalist-btn px-8 py-3"
                                                    >
                                                        {slide.cta || 'VER COLECCIÓN'}
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {products.length > 0 && (
                                    <div className="px-4 md:px-8 py-6 flex overflow-x-auto no-scrollbar gap-2 border-b border-zinc-900 sticky top-[72px] bg-black/95 z-30">
                                        {categories.map(cat => (
                                            <button key={cat} onClick={() => setActiveCategory(cat)} className={`brutalist-btn-outline px-4 py-1 text-xs whitespace-nowrap ${activeCategory === cat ? 'active' : ''}`}>{cat}</button>
                                        ))}
                                    </div>
                                )}

                                <main className="p-4 md:p-8 grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-8">
                                    {filteredProducts.map(product => (
                                        <div key={product.id} className="brutalist-card flex flex-col cursor-pointer" onClick={() => openProduct(product)}>
                                            <div className="relative w-full aspect-[4/5] bg-zinc-950 border-b border-zinc-800">
                                                <SmoothImage src={product.images?.[0]} className="absolute inset-0 w-full h-full object-cover" />
                                                <div className="absolute top-2 left-2 bg-white text-black font-bebas px-2 py-0.5 text-sm z-10">{product.category}</div>
                                                {product.discountPrice && product.discountPrice > 0 && (
                                                    <div className="absolute top-2 right-2 bg-kuraRed text-black font-bebas px-2 py-0.5 text-sm z-10 animate-pulse">OFERTA</div>
                                                )}
                                            </div>
                                            <div className="p-4 flex flex-col flex-1">
                                                <h2 className="text-xl md:text-2xl font-bebas tracking-wide leading-tight mb-1">{product.title}</h2>
                                                
                                                {/* Mostrar Precios con Descuento en el Catálogo */}
                                                {product.discountPrice && product.discountPrice > 0 ? (
                                                    <div className="flex flex-col mt-auto pt-2">
                                                        <p className="text-zinc-500 line-through text-xs font-mono">NIO {product.price}</p>
                                                        <p className="text-kuraRed font-bold font-mono text-sm">NIO {product.discountPrice}</p>
                                                    </div>
                                                ) : (
                                                    <p className="text-kuraRed font-bold font-mono text-sm mt-auto pt-2">NIO {product.price}</p>
                                                )}
                                                
                                            </div>
                                        </div>
                                    ))}
                                </main>
                            </div>
                        ) : (
                            
                            // VISTA DE PRODUCTO
                            <div className="animate-slideUp pb-32 md:pb-20 p-4 md:p-8">
                                <div className="flex gap-2 text-xs text-zinc-500 mb-6 font-mono uppercase">
                                    <span className="cursor-pointer hover:text-white" onClick={closeProduct}>INICIO</span> / <span className="text-kuraRed">{selectedProduct.title}</span>
                                </div>

                                <div className="flex flex-col md:flex-row gap-6 md:gap-12 lg:gap-20 mb-10">
                                    <div className="w-full md:w-[55%] flex flex-col-reverse md:flex-row gap-4">
                                        {selectedProduct.images?.length > 1 && (
                                            <div className="flex md:flex-col gap-3 overflow-x-auto no-scrollbar md:w-24 shrink-0">
                                                {selectedProduct.images.map((img, idx) => (
                                                    <button key={idx} onClick={() => setMainImageIndex(idx)} className={`w-20 h-24 md:w-full shrink-0 border-2 ${mainImageIndex === idx ? 'border-kuraRed' : 'border-zinc-800'}`}>
                                                        <SmoothImage src={img} className="w-full h-full object-cover" />
                                                    </button>
                                                ))}
                                            </div>
                                        )}
                                        <div className="w-full border border-zinc-800 bg-zinc-950 relative">
                                            <SmoothImage src={selectedProduct.images?.[mainImageIndex]} className="w-full h-auto aspect-[4/5] object-cover" />
                                        </div>
                                    </div>

                                    <div className="w-full md:w-[45%] flex flex-col">
                                        <p className="text-kuraRed font-mono text-sm tracking-widest mb-2 font-bold uppercase">{selectedProduct.category} FIT</p>
                                        <h2 className="text-5xl md:text-7xl font-bebas mb-2 leading-none tracking-wide">{selectedProduct.title}</h2>
                                        
                                        {/* Visualización del SKU */}
                                        {selectedProduct.sku && (
                                            <p className="text-zinc-500 font-mono text-xs tracking-widest uppercase mb-4 border-b border-zinc-800 pb-4">
                                                SKU: <span className="text-white">{selectedProduct.sku}</span>
                                            </p>
                                        )}

                                        {/* Visualización del Precio con Descuento */}
                                        <div className="flex items-end gap-4 mb-8">
                                            {selectedProduct.discountPrice && selectedProduct.discountPrice > 0 ? (
                                                <>
                                                    <span className="text-4xl md:text-5xl font-mono text-kuraRed font-bold">NIO {selectedProduct.discountPrice}</span>
                                                    <span className="text-xl md:text-2xl font-mono text-zinc-500 line-through mb-1">NIO {selectedProduct.price}</span>
                                                </>
                                            ) : (
                                                <span className="text-4xl md:text-5xl font-mono text-white">NIO {selectedProduct.price}</span>
                                            )}
                                        </div>

                                        <p className="text-zinc-400 mb-8 leading-relaxed whitespace-pre-wrap">{selectedProduct.description}</p>
                                        
                                        {selectedProduct.details && selectedProduct.details.length > 0 && (
                                            <ul className="mb-8 space-y-2 border-t border-zinc-900 pt-6">
                                                {selectedProduct.details.map((detail, idx) => (
                                                    <li key={idx} className="flex gap-3 text-zinc-300">
                                                        <span className="text-kuraRed">■</span> {detail}
                                                    </li>
                                                ))}
                                            </ul>
                                        )}

                                        {selectedProduct.sizes && selectedProduct.sizes.length > 0 && (
                                            <div className="mb-8 border-t border-zinc-900 pt-6">
                                                <div className="flex justify-between items-center mb-4">
                                                    <p className="text-xs text-zinc-500 tracking-widest">SELECCIONA TALLA</p>
                                                    {storeConfig.sizeGuide && (
                                                        <button onClick={() => setIsSizeModalOpen(true)} className="text-kuraRed text-xs underline decoration-kuraRed/50 hover:text-white transition-colors">GUÍA DE MEDIDAS</button>
                                                    )}
                                                </div>
                                                <div className="flex flex-wrap gap-3">
                                                    {selectedProduct.sizes.map(size => (
                                                        <button 
                                                            key={size} 
                                                            onClick={() => setSelectedSize(size)}
                                                            className={`font-bebas text-2xl w-14 h-14 border-2 transition-all ${selectedSize === size ? 'bg-kuraRed border-kuraRed text-black scale-110' : 'border-zinc-800 text-zinc-400 hover:border-kuraRed hover:text-white'}`}
                                                        >
                                                            {size}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        <button 
                                            onClick={() => addToCart(selectedProduct)} 
                                            className="brutalist-btn w-full py-4 text-2xl font-bebas flex justify-center items-center gap-3 mt-auto"
                                        >
                                            <span>＋</span> AÑADIR AL CARRITO
                                        </button>
                                    </div>
                                </div>

                                {/* SECCIONES INFERIORES */}
                                {products.filter(p => p.category === selectedProduct.category && p.id !== selectedProduct.id).length > 0 && (
                                    <div className="mb-12 border-t border-zinc-900 pt-10">
                                        <h3 className="font-bebas text-3xl md:text-4xl mb-6 flex items-center gap-4">
                                            <span className="w-8 h-[2px] bg-kuraRed"></span> PRODUCTOS SIMILARES
                                        </h3>
                                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                                            {products
                                                .filter(p => p.category === selectedProduct.category && p.id !== selectedProduct.id)
                                                .slice(0, 4)
                                                .map(item => (
                                                    <div key={item.id} className="brutalist-card cursor-pointer group flex flex-col" onClick={() => openProduct(item)}>
                                                        <div className="relative w-full aspect-[4/5] bg-zinc-950 border-b border-zinc-800 overflow-hidden">
                                                            <img src={item.images?.[0]} className="absolute inset-0 w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                                                            {item.discountPrice && item.discountPrice > 0 && (
                                                                <div className="absolute top-2 right-2 bg-kuraRed text-black font-bebas px-2 py-0.5 text-xs z-10">OFERTA</div>
                                                            )}
                                                        </div>
                                                        <div className="p-3 flex flex-col flex-1">
                                                            <p className="font-bebas text-lg truncate leading-none mb-1">{item.title}</p>
                                                            <p className="text-kuraRed text-xs font-bold font-mono mt-auto">NIO {getPrice(item)}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                        </div>
                                    </div>
                                )}

                                {products.filter(p => p.category !== selectedProduct.category).length > 0 && (
                                    <div className="mb-10">
                                        <h3 className="font-bebas text-3xl md:text-4xl mb-6 flex items-center gap-4 text-zinc-500">
                                            <span className="w-8 h-[2px] bg-zinc-500"></span> ESTO PUEDE INTERESARTE
                                        </h3>
                                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                                            {products
                                                .filter(p => p.category !== selectedProduct.category)
                                                .sort(() => 0.5 - Math.random())
                                                .slice(0, 4)
                                                .map(item => (
                                                    <div key={item.id} className="brutalist-card cursor-pointer grayscale hover:grayscale-0 transition-all duration-300 flex flex-col" onClick={() => openProduct(item)}>
                                                        <div className="relative w-full aspect-[4/5] bg-zinc-950 border-b border-zinc-800">
                                                            <img src={item.images?.[0]} className="absolute inset-0 w-full h-full object-cover" />
                                                        </div>
                                                        <div className="p-3 flex flex-col flex-1">
                                                            <p className="font-bebas text-lg truncate text-zinc-300 leading-none mb-1">{item.title}</p>
                                                            <p className="text-zinc-600 text-[10px] uppercase font-mono mt-auto">{item.category}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* MODAL DE TALLAS */}
                    {isSizeModalOpen && (
                        <div className="fixed inset-0 z-[300] bg-black/95 flex items-center justify-center p-4" onClick={() => setIsSizeModalOpen(false)}>
                            <div className="relative max-w-3xl w-full border border-zinc-800 bg-[#0a0a0a] p-6 animate-slideUp overflow-y-auto max-h-[90vh]" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setIsSizeModalOpen(false)} className="absolute top-4 right-4 text-zinc-500 hover:text-white font-bebas text-2xl">✕</button>
                                <h3 className="font-bebas text-3xl text-kuraRed mb-6">GUÍA DE MEDIDAS</h3>
                                {storeConfig.sizeGuide ? (
                                    <img src={storeConfig.sizeGuide} className="w-full h-auto border border-zinc-800" />
                                ) : (
                                    <p className="text-zinc-500">Guía no disponible temporalmente.</p>
                                )}
                            </div>
                        </div>
                    )}

                    {/* MODAL DE CARRITO Y CHECKOUT */}
                    {isCartOpen && (
                        <div className="fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm flex justify-end">
                            <div className="bg-[#050505] w-full md:w-[450px] h-full border-l border-zinc-800 shadow-2xl flex flex-col animate-slideUp">
                                <div className="p-6 border-b border-zinc-800 flex justify-between items-center bg-black shrink-0">
                                    <h2 className="font-bebas text-3xl tracking-widest flex items-center gap-3">
                                        <span className="w-3 h-3 bg-kuraRed inline-block"></span> 
                                        {pendingOrder ? 'PAGO Y CONFIRMACIÓN' : 'TU ARSENAL'}
                                    </h2>
                                    <button onClick={() => setIsCartOpen(false)} className="text-zinc-500 hover:text-kuraRed text-xl">✕</button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-6 scroll-smooth">
                                    {!pendingOrder ? (
                                        cart.length === 0 ? (
                                            <div className="flex flex-col items-center justify-center h-full text-zinc-600 space-y-4">
                                                <span className="text-4xl">🛒</span>
                                                <p className="font-bebas text-2xl tracking-widest">CARRITO VACÍO</p>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col gap-8 pb-4">
                                                {/* LISTA DE ITEMS */}
                                                <div className="space-y-4">
                                                    {cart.map(item => (
                                                        <div key={item.cartId} className="flex gap-4 border border-zinc-800 p-3 bg-black relative shadow-sm">
                                                            <img src={item.images?.[0]} className="w-20 h-24 object-cover border border-zinc-900 shrink-0" />
                                                            <div className="flex-1 pt-1 overflow-hidden">
                                                                <p className="font-bebas text-lg pr-6 leading-none text-zinc-100 line-clamp-2">{item.title}</p>
                                                                <p className="text-xs text-zinc-500 mt-2 font-bold tracking-wider">TALLA: {item.selectedSize}</p>
                                                                
                                                                {/* Precio de Carrito */}
                                                                {item.discountPrice && item.discountPrice > 0 ? (
                                                                    <div className="mt-1 flex items-center gap-2">
                                                                        <span className="text-kuraRed text-sm font-bold">NIO {item.discountPrice}</span>
                                                                        <span className="text-zinc-600 text-[10px] line-through">NIO {item.price}</span>
                                                                    </div>
                                                                ) : (
                                                                    <p className="text-kuraRed text-sm mt-1 font-bold">NIO {item.price}</p>
                                                                )}

                                                            </div>
                                                            <button onClick={() => setCart(cart.filter(i => i.cartId !== item.cartId))} className="absolute top-2 right-2 text-zinc-600 hover:text-red-500 p-2 leading-none">✕</button>
                                                        </div>
                                                    ))}
                                                </div>

                                                {/* SECCIÓN DE COBRO (FORM + TOTALES) */}
                                                <div className="border-t border-zinc-800 pt-8">
                                                    <h3 className="font-bebas text-2xl mb-4 text-white flex items-center gap-2">
                                                        <span className="w-2 h-2 bg-kuraRed inline-block"></span> RESUMEN Y ENVÍO
                                                    </h3>
                                                    
                                                    {/* CONSOLIDADO DE PRECIOS */}
                                                    <div className="bg-zinc-950 border border-zinc-800 p-4 font-mono text-sm mb-6">
                                                        <div className="flex justify-between mb-2 text-zinc-400"><span>SUBTOTAL</span> <span>NIO {cartSubtotal}</span></div>
                                                        <div className="flex justify-between mb-2 text-zinc-400"><span>ENVÍO</span> <span>NIO {currentShippingCost}</span></div>
                                                        <div className="flex justify-between pt-3 border-t border-zinc-800 font-bebas text-2xl text-white mt-3 items-end">
                                                            <span className="text-lg">TOTAL ESTIMADO</span>
                                                            <span className="text-kuraRed text-3xl leading-none">NIO {cartTotal}</span>
                                                        </div>
                                                    </div>

                                                    {/* SELECTOR DE ZONA */}
                                                    <div className="mb-6">
                                                        <p className="text-[10px] text-zinc-500 mb-2 font-bold uppercase tracking-widest">SELECCIONA ZONA DE ENVÍO</p>
                                                        <div className="flex flex-row gap-2">
                                                            <button type="button" onClick={() => setShippingZone('managua')} className={`flex-1 py-3 px-2 text-xs md:text-sm font-bold transition-all ${shippingZone === 'managua' ? 'bg-kuraRed text-black border-2 border-kuraRed' : 'bg-transparent text-zinc-500 border-2 border-zinc-800'}`}>MANAGUA (NIO 100)</button>
                                                            <button type="button" onClick={() => setShippingZone('departamentos')} className={`flex-1 py-3 px-2 text-xs md:text-sm font-bold transition-all ${shippingZone === 'departamentos' ? 'bg-kuraRed text-black border-2 border-kuraRed' : 'bg-transparent text-zinc-500 border-2 border-zinc-800'}`}>DEPARTAMENTOS (NIO 165)</button>
                                                        </div>
                                                    </div>

                                                    <form onSubmit={handleProceedToPayment} className="space-y-4">
                                                        <p className="text-[10px] text-zinc-500 mb-2 font-bold uppercase tracking-widest border-t border-zinc-800 pt-6">DATOS DE ENTREGA</p>
                                                        <input required type="text" placeholder="NOMBRE COMPLETO" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value.toUpperCase()})} className="w-full bg-black border border-zinc-800 p-3 text-white outline-none focus:border-kuraRed transition-colors" />
                                                        <input required type="tel" placeholder="TELÉFONO (Ej: 8888 8888)" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} className="w-full bg-black border border-zinc-800 p-3 text-white outline-none focus:border-kuraRed transition-colors" />
                                                        <textarea required placeholder="DIRECCIÓN EXACTA" value={formData.address} onChange={e => setFormData({...formData, address: e.target.value.toUpperCase()})} className="w-full bg-black border border-zinc-800 p-3 text-white outline-none focus:border-kuraRed h-24 resize-none transition-colors"></textarea>
                                                        
                                                        <button type="submit" className="brutalist-btn w-full py-4 text-xl mt-4">IR A PAGAR</button>
                                                    </form>
                                                </div>
                                            </div>
                                        )
                                    ) : (
                                        // PASO 2: INSTRUCCIONES DE PAGO Y SUBIDA DE VOUCHER REPARADO
                                        <div className="flex flex-col pb-10 animate-slideUp">
                                            
                                            {/* AVISO DE ENTREGA RECUPERADO */}
                                            <div className="bg-[#111] border border-kuraRed p-4 mb-6">
                                                <h4 className="text-kuraRed font-bebas text-xl mb-1 flex items-center gap-2">
                                                    <span className="text-lg">⚠️</span> AVISO DE ENTREGA
                                                </h4>
                                                <p className="text-zinc-400 text-xs font-mono">
                                                    Recuerda que los envíos se realizan de 24 a 72 horas hábiles posteriores a la confirmación de tu pago. Te contactaremos vía WhatsApp para coordinar la entrega de tu paquete.
                                                </p>
                                            </div>

                                            {/* CONTENEDOR DE RESUMEN - SIN BLOQUEO DE OVERFLOW */}
                                            <div className="bg-zinc-950 border border-zinc-800 p-6 mb-6 relative shadow-lg">
                                                <div className="absolute -right-4 -top-4 w-16 h-16 bg-kuraRed opacity-10 rotate-45 pointer-events-none"></div>
                                                <p className="text-zinc-500 text-[10px] uppercase mb-1">ORDEN RESERVADA</p>
                                                <h3 className="text-white font-bebas text-3xl mb-4 tracking-wider">#{pendingOrder.orderNumber}</h3>
                                                
                                                <div className="space-y-2 text-xs font-mono mb-6 pb-4 border-b border-zinc-800 text-zinc-400">
                                                    <div className="flex justify-between"><span>SUBTOTAL:</span><span>NIO {pendingOrder.subtotal}</span></div>
                                                    <div className="flex justify-between"><span>ENVÍO ({pendingOrder.shippingZone}):</span><span>NIO {pendingOrder.shippingCost}</span></div>
                                                    <div className="flex justify-between text-kuraRed font-bold text-lg mt-2 pt-2 border-t border-zinc-800/50">
                                                        <span>TOTAL A PAGAR:</span><span>NIO {pendingOrder.total}</span>
                                                    </div>
                                                </div>

                                                <div className="bg-black border border-zinc-800 p-4 text-xs text-zinc-300 font-mono">
                                                    <p className="font-bold text-white mb-3 text-sm flex items-center gap-2">
                                                        <span className="w-2 h-2 bg-green-500 inline-block"></span> DATOS DE TRANSFERENCIA
                                                    </p>
                                                    <div className="mb-4">
                                                        <p className="text-kuraRed font-bold mb-1">BAC CÓRDOBAS</p>
                                                        <p className="mb-1"><span className="text-zinc-500">Cliente:</span> KATHY VALESKA MEMBREÑO MEDINA</p>
                                                        <p className="mb-1"><span className="text-zinc-500">Número de cuenta:</span> 367298642</p>
                                                    </div>
                                                    <div>
                                                        <p className="text-kuraRed font-bold mb-1">LAFISE CÓRDOBAS</p>
                                                        <p className="mb-1"><span className="text-zinc-500">Cliente:</span> KATHY VALESKA MEMBREÑO MEDINA</p>
                                                        <p className="mb-1"><span className="text-zinc-500">Número de cuenta:</span> 117240166</p>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* ZONA DE SUBIDA DE COMPROBANTE */}
                                            <div className="mb-6">
                                                <p className="text-xs text-white mb-3 font-bold border-l-2 border-kuraRed pl-2">ADJUNTA TU COMPROBANTE:</p>
                                                <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-zinc-700 border-dashed hover:border-kuraRed hover:bg-zinc-900 transition-colors cursor-pointer relative">
                                                    {receiptFile ? (
                                                        <div className="text-center p-2">
                                                            <span className="text-3xl mb-2 block">📄</span>
                                                            <span className="text-kuraRed font-bold text-xs block truncate max-w-[200px]">{receiptFile.name}</span>
                                                            <span className="text-zinc-500 text-[10px] mt-1 block">(Clic para cambiar)</span>
                                                        </div>
                                                    ) : (
                                                        <div className="text-center text-zinc-500">
                                                            <span className="text-2xl mb-2 block">↑</span>
                                                            <span className="text-xs">Toca para subir la captura</span>
                                                        </div>
                                                    )}
                                                    <input type="file" accept="image/*" onChange={(e) => setReceiptFile(e.target.files[0])} className="hidden" />
                                                </label>
                                            </div>

                                            {/* BOTONES FINALES Y TÉRMINOS */}
                                            <label className="flex items-start gap-3 cursor-pointer text-xs text-zinc-400 mb-8 p-3 border border-zinc-800 bg-black">
                                                <input type="checkbox" checked={acceptTerms} onChange={(e) => setAcceptTerms(e.target.checked)} className="mt-0.5 accent-kuraRed w-4 h-4 shrink-0" />
                                                <span className="leading-tight">Acepto la <a href="#" className="text-white underline">política de cambios y devoluciones</a> de Kura Studio.</span>
                                            </label>

                                            <button 
                                                onClick={handleFinalizeOrder} 
                                                disabled={!receiptFile || !acceptTerms || isUploading}
                                                className="brutalist-btn w-full py-4 text-xl flex justify-center items-center gap-2"
                                            >
                                                {isUploading ? (
                                                    <span className="animate-pulse">ENVIANDO ORDEN...</span>
                                                ) : (
                                                    <>
                                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                                                            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.888-.788-1.489-1.761-1.663-2.06-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
                                                        </svg>
                                                        CONFIRMAR ORDEN
                                                    </>
                                                )}
                                            </button>
                                            
                                            <button 
                                                onClick={() => {setPendingOrder(null); setReceiptFile(null); setAcceptTerms(false);}} 
                                                disabled={isUploading}
                                                className="w-full mt-6 text-xs font-bold tracking-widest text-zinc-600 hover:text-white transition-colors py-2"
                                            >
                                                ← VOLVER AL CARRITO
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KuraStudio />);
    </script>
</body>
</html>
