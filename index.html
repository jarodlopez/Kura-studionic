<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KURA STUDIO | Dark Japan Punk</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kuraRed: '#ff003c',
                        kuraDark: '#0a0a0a',
                    },
                    fontFamily: {
                        bebas: ['"Bebas Neue"', 'sans-serif'],
                        mono: ['"Space Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        body { 
            background-color: #000000; 
            color: #ffffff; 
            /* Patrón de cuadrícula sutil para fondo tech */
            background-image: linear-gradient(rgba(255, 0, 60, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 0, 60, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        
        .brutalist-card {
            border: 2px solid #333;
            background: #050505;
            transition: all 0.2s ease;
        }
        
        .brutalist-card:hover {
            border-color: #ff003c;
            transform: translate(-4px, -4px);
            box-shadow: 8px 8px 0px 0px #ff003c;
        }

        .brutalist-btn {
            background: #ff003c;
            color: black;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .brutalist-btn:hover {
            background: black;
            color: #ff003c;
            border: 2px solid #ff003c;
            box-shadow: 4px 4px 0px 0px #ff003c;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #ff003c; }

        .text-outline {
            -webkit-text-stroke: 1px #ff003c;
            color: transparent;
        }
    </style>
</head>
<body class="font-mono">
    <div id="root"></div>

    <script type="text/babel">
        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "tu-proyecto.firebaseapp.com",
            projectId: "tu-proyecto",
            storageBucket: "tu-proyecto.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        function KuraStudio() {
            const [products, setProducts] = useState([]);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', phone: '', address: '' });

            useEffect(() => {
                const fetchProducts = async () => {
                    try {
                        const snapshot = await db.collection("products").get();
                        if (!snapshot.empty) {
                            const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setProducts(items);
                            checkDynamicLink(items);
                            return;
                        }
                    } catch (error) {
                        console.log("Esperando Firebase. Usando mock data.");
                    }
                    
                    const mockData = [
                        { id: '1', title: 'T-Shirt AKIRA', price: 850, size: 'XL', description: 'Oversize. Algodón pesado 100%. Estampado frontal y espalda. Silueta cuadrada japonesa.', image: 'https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?auto=format&fit=crop&q=80&w=800' },
                        { id: '2', title: 'Cyber Oni Hoodie', price: 1200, size: 'L', description: 'Corte japonés, mangas anchas. Logo Kura en rojo sangre bordado en el pecho.', image: 'https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&q=80&w=800' },
                        { id: '3', title: 'Tokyo Punk Tee', price: 900, size: 'XXL', description: 'Corte super oversize. Lavado ácido negro. Gráfico de mecha en la espalda.', image: 'https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?auto=format&fit=crop&q=80&w=800' }
                    ];
                    setProducts(mockData);
                    checkDynamicLink(mockData);
                };
                fetchProducts();
            }, []);

            const checkDynamicLink = (items) => {
                const urlParams = new URLSearchParams(window.location.search);
                const productId = urlParams.get('product');
                if (productId) {
                    const product = items.find(p => p.id === productId);
                    if (product) setSelectedProduct(product);
                }
            };

            const openProduct = (product) => {
                setSelectedProduct(product);
                window.history.pushState(null, '', `?product=${product.id}`);
            };

            const closeProduct = () => {
                setSelectedProduct(null);
                window.history.pushState(null, '', window.location.pathname);
            };

            const addToCart = (product) => {
                setCart([...cart, { ...product, cartId: Date.now() }]);
                setIsCartOpen(true);
                closeProduct();
            };

            const removeFromCart = (cartId) => {
                setCart(cart.filter(item => item.cartId !== cartId));
            };

            const totalCart = cart.reduce((acc, item) => acc + item.price, 0);

            const handleWhatsAppCheckout = (e) => {
                e.preventDefault();
                if (cart.length === 0) return alert('No tienes nada en el arsenal.');

                let message = `*NUEVO PEDIDO - KURA STUDIO* 🩸%0A%0A`;
                message += `*Cliente:* ${formData.name}%0A`;
                message += `*Teléfono:* ${formData.phone}%0A`;
                message += `*Ubicación:* ${formData.address}%0A%0A`;
                message += `*PRENDAS SELECCIONADAS:*%0A`;
                cart.forEach(item => {
                    message += `▪️ ${item.title} (Talla: ${item.size}) - NIO ${item.price}%0A`;
                });
                message += `%0A*TOTAL: NIO ${totalCart}*`;

                window.open(`https://wa.me/50587091008?text=${message}`, '_blank');
            };

            return (
                <div className="min-h-screen relative overflow-hidden">
                    {/* Elemento Decorativo de Fondo */}
                    <div className="fixed top-0 left-0 w-full h-full flex items-center justify-center opacity-5 pointer-events-none z-0">
                        <span className="font-bebas text-[20rem] leading-none text-white writing-vertical-rl">クラスタジオ</span>
                    </div>

                    <div className="relative z-10 p-4 md:p-8 max-w-7xl mx-auto">
                        {/* NAVBAR */}
                        <header className="flex justify-between items-end mb-16 border-b-2 border-zinc-800 pb-4">
                            <div>
                                <p className="text-kuraRed text-xs tracking-[0.3em] mb-1 font-bold">DARK JAPAN PUNK // 2026</p>
                                <h1 className="text-5xl md:text-7xl font-bebas tracking-wider leading-none">
                                    KURA<span className="text-outline">STUDIO</span>
                                </h1>
                            </div>
                            <button 
                                onClick={() => setIsCartOpen(true)}
                                className="brutalist-card px-6 py-2 font-bold uppercase text-sm tracking-widest text-white flex items-center gap-2"
                            >
                                <span className="w-2 h-2 bg-kuraRed rounded-full animate-pulse"></span>
                                CART [{cart.length}]
                            </button>
                        </header>

                        {/* PRODUCT GRID */}
                        <main className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                            {products.map(product => (
                                <div key={product.id} className="brutalist-card p-4 flex flex-col group cursor-pointer" onClick={() => openProduct(product)}>
                                    <div className="relative w-full aspect-[4/5] bg-zinc-900 mb-6 overflow-hidden border border-zinc-800">
                                        {/* Etiqueta de Talla Flotante */}
                                        <div className="absolute top-2 right-2 bg-kuraRed text-black font-bebas px-3 py-1 text-xl z-10">
                                            SIZE {product.size}
                                        </div>
                                        <img 
                                            src={product.image} 
                                            alt={product.title} 
                                            className="object-cover w-full h-full group-hover:scale-105 transition-transform duration-500 grayscale group-hover:grayscale-0" 
                                        />
                                    </div>
                                    <div className="flex justify-between items-start mb-4">
                                        <h2 className="text-3xl font-bebas tracking-wide leading-none">{product.title}</h2>
                                        <p className="text-kuraRed font-bold text-lg whitespace-nowrap ml-4">NIO {product.price}</p>
                                    </div>
                                    <button className="brutalist-btn w-full font-bebas text-2xl py-2 mt-auto tracking-wider">
                                        VER PRENDA
                                    </button>
                                </div>
                            ))}
                        </main>
                    </div>

                    {/* MODAL DE PRODUCTO */}
                    {selectedProduct && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="brutalist-card max-w-4xl w-full flex flex-col md:flex-row relative animate-[fadeIn_0.2s_ease-out]">
                                <button onClick={closeProduct} className="absolute top-4 right-4 text-white hover:text-kuraRed font-mono text-xl z-20 bg-black w-10 h-10 border border-zinc-800 flex items-center justify-center">X</button>
                                
                                <div className="w-full md:w-1/2 aspect-square md:aspect-auto bg-zinc-900 border-b md:border-b-0 md:border-r border-zinc-800">
                                    <img src={selectedProduct.image} alt={selectedProduct.title} className="w-full h-full object-cover" />
                                </div>
                                
                                <div className="w-full md:w-1/2 p-8 flex flex-col justify-center bg-kuraDark">
                                    <p className="text-kuraRed font-mono text-sm tracking-widest mb-2">OVERSIZE FIT</p>
                                    <h2 className="text-5xl font-bebas text-white mb-6 leading-none">{selectedProduct.title}</h2>
                                    <p className="text-zinc-400 font-mono text-sm leading-relaxed mb-8 border-l-2 border-kuraRed pl-4">
                                        {selectedProduct.description}
                                    </p>
                                    
                                    <div className="flex justify-between items-center mb-8 bg-black p-4 border border-zinc-800">
                                        <div>
                                            <p className="text-xs text-zinc-500 mb-1">TALLA DISPONIBLE</p>
                                            <p className="font-bebas text-2xl">{selectedProduct.size}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-xs text-zinc-500 mb-1">PRECIO</p>
                                            <p className="font-bebas text-3xl text-kuraRed">NIO {selectedProduct.price}</p>
                                        </div>
                                    </div>

                                    <button onClick={() => addToCart(selectedProduct)} className="brutalist-btn w-full font-bebas text-3xl py-4 tracking-wider">
                                        AGREGAR AL CARRITO
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* SLIDE-OVER CARRITO */}
                    {isCartOpen && (
                        <div className="fixed inset-0 z-50 flex justify-end bg-black/50 backdrop-blur-sm">
                            <div className="h-full w-full md:w-[450px] bg-kuraDark border-l-2 border-kuraRed flex flex-col shadow-[-20px_0_50px_rgba(255,0,60,0.1)] animate-[slideIn_0.2s_ease-out]">
                                <div className="p-6 border-b border-zinc-800 flex justify-between items-center bg-black">
                                    <h2 className="text-3xl font-bebas text-white tracking-widest">CHECKOUT</h2>
                                    <button onClick={() => setIsCartOpen(false)} className="text-zinc-500 hover:text-kuraRed">CERRAR ✕</button>
                                </div>

                                <div className="flex-1 overflow-y-auto p-6 space-y-4">
                                    {cart.length === 0 ? (
                                        <p className="text-zinc-600 text-center mt-10 font-mono text-sm uppercase">Cero prendas seleccionadas.</p>
                                    ) : (
                                        cart.map(item => (
                                            <div key={item.cartId} className="flex justify-between items-center bg-black p-4 border border-zinc-800 hover:border-kuraRed transition-colors">
                                                <div>
                                                    <p className="font-bebas text-2xl leading-none mb-1">{item.title}</p>
                                                    <p className="text-zinc-400 text-xs font-mono">TALLA: {item.size} // NIO {item.price}</p>
                                                </div>
                                                <button onClick={() => removeFromCart(item.cartId)} className="text-kuraRed hover:text-white font-mono text-xl">✕</button>
                                            </div>
                                        ))
                                    )}
                                </div>

                                <div className="p-6 bg-black border-t border-zinc-800">
                                    <div className="flex justify-between items-end mb-6">
                                        <span className="font-mono text-zinc-400 text-sm">TOTAL ESTIMADO</span>
                                        <span className="font-bebas text-4xl text-kuraRed leading-none">NIO {totalCart}</span>
                                    </div>

                                    <form onSubmit={handleWhatsAppCheckout} className="space-y-3">
                                        <input required type="text" placeholder="NOMBRE / ALIAS" className="w-full bg-kuraDark border border-zinc-800 text-white p-3 font-mono text-sm focus:outline-none focus:border-kuraRed transition-colors placeholder:text-zinc-600" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} />
                                        <input required type="tel" placeholder="TELÉFONO" className="w-full bg-kuraDark border border-zinc-800 text-white p-3 font-mono text-sm focus:outline-none focus:border-kuraRed transition-colors placeholder:text-zinc-600" value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value})} />
                                        <textarea required placeholder="PUNTO DE ENTREGA" className="w-full bg-kuraDark border border-zinc-800 text-white p-3 font-mono text-sm focus:outline-none focus:border-kuraRed transition-colors placeholder:text-zinc-600 h-20 resize-none" value={formData.address} onChange={(e) => setFormData({...formData, address: e.target.value})} />
                                        
                                        <button type="submit" className="w-full bg-white text-black font-bebas text-2xl py-4 mt-4 hover:bg-kuraRed hover:text-white transition-colors tracking-widest border border-transparent">
                                            CONFIRMAR POR WHATSAPP
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KuraStudio />);
    </script>
</body>
</html>
