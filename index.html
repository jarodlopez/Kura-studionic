<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KURA STUDIO | Envíos a toda Nicaragua</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kuraRed: '#ff003c',
                        kuraDark: '#0a0a0a',
                    },
                    fontFamily: {
                        bebas: ['"Bebas Neue"', 'sans-serif'],
                        mono: ['"Space Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        body { 
            background-color: #000000; 
            color: #ffffff; 
            background-image: linear-gradient(rgba(255, 0, 60, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 0, 60, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            overscroll-behavior-y: none;
        }
        
        .brutalist-card {
            border: 2px solid #333;
            background: #050505;
            transition: all 0.2s ease;
        }
        .brutalist-card:hover { border-color: #ff003c; transform: translate(-4px, -4px); box-shadow: 8px 8px 0px 0px #ff003c; }

        .brutalist-btn {
            background: #ff003c; color: black; border: 2px solid transparent; transition: all 0.2s ease;
        }
        .brutalist-btn:hover { background: black; color: #ff003c; border: 2px solid #ff003c; box-shadow: 4px 4px 0px 0px #ff003c; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #ff003c; }
        .text-outline { -webkit-text-stroke: 1px #ff003c; color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="font-mono">
    <div id="root"></div>

    <script type="text/babel">
        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "tu-proyecto.firebaseapp.com",
            projectId: "tu-proyecto"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        function KuraStudio() {
            const [products, setProducts] = useState([]);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [selectedSize, setSelectedSize] = useState('');
            
            // CARRITO CON MEMORIA (localStorage)
            const [cart, setCart] = useState(() => {
                try {
                    const savedCart = localStorage.getItem('kura_cart');
                    return savedCart ? JSON.parse(savedCart) : [];
                } catch (error) {
                    return [];
                }
            });
            
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', phone: '', address: '' });

            // GUARDAR CARRITO CUANDO CAMBIA
            useEffect(() => {
                try {
                    localStorage.setItem('kura_cart', JSON.stringify(cart));
                } catch (error) {
                    console.error("Error guardando el carrito", error);
                }
            }, [cart]);

            useEffect(() => {
                const fetchProducts = async () => {
                    try {
                        const snapshot = await db.collection("products").get();
                        if (!snapshot.empty) {
                            const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setProducts(items);
                            checkDynamicLink(items);
                            return;
                        }
                    } catch (error) { console.log("Usando mock data."); }
                    
                    const mockData = [
                        { id: '1', title: 'T-SHIRT AKIRA', price: 850, category: 'T-SHIRTS', sizes: ['M', 'L', 'XL', 'XXL'], description: 'Nuestra pieza insignia. Algodón pesado de alta densidad. Corte cuadrado japonés perfecto para un look urbano y agresivo.', details: ['100% Algodón 240gsm', 'Corte Boxy / Oversize', 'Estampado serigráfico de alta durabilidad', 'Lavado en frío, no usar secadora'], image: 'https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?auto=format&fit=crop&q=80&w=800' },
                        { id: '2', title: 'TOKYO PUNK TEE', price: 900, category: 'T-SHIRTS', sizes: ['L', 'XL'], description: 'Corte super oversize. Lavado ácido negro para un look vintage destructivo. Gráfico de mecha en la espalda.', details: ['Algodón 100% lavado ácido', 'Costuras expuestas', 'Gráfico trasero gigante'], image: 'https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?auto=format&fit=crop&q=80&w=800' },
                        { id: '3', title: 'CYBER ONI HOODIE', price: 1200, category: 'HOODIES', sizes: ['M', 'L', 'XL'], description: 'Corte japonés, mangas extra anchas. Logo Kura en rojo sangre bordado en el pecho. Capucha profunda para ocultarte del sistema.', details: ['French Terry 350gsm', 'Bordado 3D de alta precisión', 'Hombros caídos (Drop Shoulder)'], image: 'https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&q=80&w=800' },
                        { id: '4', title: 'SHINIGAMI HOODIE', price: 1250, category: 'HOODIES', sizes: ['XL', 'XXL'], description: 'Hoodie negro profundo con diseño brutalista en la espalda. Interior afelpado para las noches frías en la ciudad.', details: ['Mezcla Algodón/Poliester', 'Bolsillo canguro oculto', 'Etiqueta Kura cosida en manga'], image: 'https://images.unsplash.com/photo-1509942774463-acf339cf87d5?auto=format&fit=crop&q=80&w=800' },
                        { id: '5', title: 'MECHA CARGO PANTS', price: 1400, category: 'PANTS', sizes: ['S', 'M', 'L'], description: 'Pantalones cargo anchos con cintas utilitarias y bolsillos 3D. Estilo techwear puro, listos para el asfalto.', details: ['Nylon Ripstop resistente', 'Correas ajustables en tobillos', 'Múltiples bolsillos tácticos', 'Water-resistant'], image: 'https://images.unsplash.com/photo-1628718484930-1c9535eb009f?auto=format&fit=crop&q=80&w=800' }
                    ];
                    setProducts(mockData);
                    checkDynamicLink(mockData);
                };
                fetchProducts();
            }, []);

            const checkDynamicLink = (items) => {
                const urlParams = new URLSearchParams(window.location.search);
                const productId = urlParams.get('product');
                if (productId) {
                    const product = items.find(p => p.id === productId);
                    if (product) {
                        setSelectedProduct(product);
                        setSelectedSize('');
                    }
                }
            };

            const openProduct = (product) => {
                setSelectedProduct(product);
                setSelectedSize('');
                window.history.pushState(null, '', `?product=${product.id}`);
                window.scrollTo(0, 0); 
            };

            const closeProduct = () => {
                setSelectedProduct(null);
                window.history.pushState(null, '', window.location.pathname);
            };

            const addToCart = (product) => {
                if (!selectedSize) return alert('POR FAVOR SELECCIONA UNA TALLA PARA CONTINUAR.');
                setCart([...cart, { ...product, selectedSize, cartId: Date.now() }]);
                setIsCartOpen(true);
            };

            const removeFromCart = (cartId) => setCart(cart.filter(item => item.cartId !== cartId));
            const totalCart = cart.reduce((acc, item) => acc + item.price, 0);

            const handleWhatsAppCheckout = (e) => {
                e.preventDefault();
                if (cart.length === 0) return;

                let message = `*NUEVO PEDIDO - KURA STUDIO* 🩸%0A%0A`;
                message += `*Cliente:* ${formData.name}%0A*Teléfono:* ${formData.phone}%0A*Entrega:* ${formData.address}%0A%0A*ARSENAL SELECCIONADO:*%0A`;
                cart.forEach(item => { message += `▪️ ${item.title} (Talla: ${item.selectedSize}) - NIO ${item.price}%0A`; });
                message += `%0A*TOTAL ESTIMADO: NIO ${totalCart}*`;
                
                // Limpiar carrito después de enviar a WhatsApp
                setCart([]);
                localStorage.removeItem('kura_cart');
                setIsCartOpen(false);

                window.open(`https://wa.me/50587091008?text=${message}`, '_blank');
            };

            const relatedProducts = selectedProduct 
                ? products.filter(p => p.category === selectedProduct.category && p.id !== selectedProduct.id).slice(0, 3)
                : [];

            return (
                <div className="min-h-screen relative flex flex-col">
                    <div className="fixed top-0 left-0 w-full h-full flex items-center justify-center opacity-5 pointer-events-none z-0">
                        <span className="font-bebas text-[15rem] md:text-[20rem] leading-none text-white writing-vertical-rl">クラスタジオ</span>
                    </div>

                    <div className="relative z-10 w-full max-w-7xl mx-auto flex-1 flex flex-col">
                        {/* NAVBAR CONSTANTE */}
                        <header className="p-4 md:p-8 flex justify-between items-end border-b border-zinc-900 bg-black/80 backdrop-blur-md sticky top-0 z-40">
                            <div className="cursor-pointer" onClick={closeProduct}>
                                <p className="text-kuraRed text-[10px] md:text-xs tracking-[0.3em] mb-1 font-bold">ENVÍOS A TODA NICARAGUA</p>
                                <h1 className="text-4xl md:text-5xl font-bebas tracking-wider leading-none">KURA<span className="text-outline">STUDIO</span></h1>
                            </div>
                            <button onClick={() => setIsCartOpen(true)} className="brutalist-card px-4 py-2 font-bold uppercase text-xs md:text-sm tracking-widest flex items-center gap-2">
                                <span className="w-2 h-2 bg-kuraRed rounded-full animate-pulse"></span>
                                CART [{cart.length}]
                            </button>
                        </header>

                        <div className="p-4 md:p-8 flex-1">
                            {!selectedProduct ? (
                                /* --- VISTA: CATÁLOGO --- */
                                <main className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-10 fade-in">
                                    {products.map(product => (
                                        <div key={product.id} className="brutalist-card p-4 flex flex-col group cursor-pointer" onClick={() => openProduct(product)}>
                                            <div className="relative w-full aspect-[4/5] bg-zinc-900 mb-4 overflow-hidden border border-zinc-800">
                                                <div className="absolute top-0 left-0 bg-black/80 text-kuraRed font-mono px-2 py-1 text-xs border-b border-r border-zinc-800 z-10">
                                                    [{product.category}]
                                                </div>
                                                <img src={product.image} alt={product.title} className="object-cover w-full h-full md:grayscale group-hover:grayscale-0 transition-transform duration-500 md:group-hover:scale-105" />
                                            </div>
                                            <div className="flex justify-between items-start mb-4">
                                                <h2 className="text-2xl md:text-3xl font-bebas tracking-wide leading-none">{product.title}</h2>
                                                <p className="text-kuraRed font-bold text-lg ml-4">NIO {product.price}</p>
                                            </div>
                                        </div>
                                    ))}
                                </main>
                            ) : (
                                /* --- VISTA: DETALLE DE PRODUCTO PÁGINA COMPLETA --- */
                                <div className="fade-in pb-20">
                                    <button onClick={closeProduct} className="text-zinc-500 hover:text-kuraRed font-mono text-sm mb-6 flex items-center gap-2 transition-colors">
                                        <span>←</span> VOLVER AL CATÁLOGO
                                    </button>

                                    <div className="flex flex-col md:flex-row gap-8 lg:gap-16">
                                        {/* Imagen Izquierda/Arriba */}
                                        <div className="w-full md:w-1/2 border border-zinc-800 p-2 bg-black">
                                            <div className="w-full aspect-[4/5] bg-zinc-900 relative">
                                                <div className="absolute top-4 right-4 bg-kuraRed text-black font-bebas px-4 py-1 text-2xl z-10 rotate-3 shadow-[4px_4px_0_0_#000]">
                                                    NIO {selectedProduct.price}
                                                </div>
                                                <img src={selectedProduct.image} alt={selectedProduct.title} className="w-full h-full object-cover object-top" />
                                            </div>
                                        </div>

                                        {/* Info Derecha/Abajo */}
                                        <div className="w-full md:w-1/2 flex flex-col">
                                            <div className="inline-block bg-zinc-900 border border-zinc-800 text-kuraRed font-mono text-xs px-2 py-1 mb-4 w-max">
                                                [{selectedProduct.category}] // DATA FILE: {selectedProduct.id}
                                            </div>
                                            <h2 className="text-5xl md:text-7xl font-bebas mb-6 leading-none text-white">{selectedProduct.title}</h2>
                                            
                                            <p className="text-zinc-400 font-mono text-sm md:text-base leading-relaxed mb-8">
                                                {selectedProduct.description}
                                            </p>

                                            {/* Selector de Tallas */}
                                            <div className="mb-8">
                                                <div className="flex justify-between items-end mb-3">
                                                    <span className="font-mono text-xs text-zinc-500">SELECCIONA TU TALLA</span>
                                                    <span className="font-mono text-[10px] text-kuraRed underline cursor-pointer">GUÍA DE TALLAS</span>
                                                </div>
                                                <div className="flex gap-3">
                                                    {selectedProduct.sizes.map(size => (
                                                        <button 
                                                            key={size}
                                                            onClick={() => setSelectedSize(size)}
                                                            className={`h-12 flex-1 font-bebas text-2xl border transition-all ${selectedSize === size ? 'bg-kuraRed border-kuraRed text-black shadow-[4px_4px_0_0_#991b1b]' : 'bg-transparent border-zinc-700 text-white hover:border-kuraRed'}`}
                                                        >
                                                            {size}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* Características */}
                                            <div className="bg-black border border-zinc-800 p-5 mb-8">
                                                <p className="font-mono text-xs text-zinc-500 mb-4 border-b border-zinc-800 pb-2">ESPECIFICACIONES TÉCNICAS</p>
                                                <ul className="space-y-2">
                                                    {selectedProduct.details.map((detail, index) => (
                                                        <li key={index} className="font-mono text-xs md:text-sm text-zinc-300 flex gap-2">
                                                            <span className="text-kuraRed">▹</span> {detail}
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>

                                            <button onClick={() => addToCart(selectedProduct)} className="brutalist-btn w-full font-bebas text-3xl py-5 tracking-wider mt-auto">
                                                {selectedSize ? 'AÑADIR AL ARSENAL' : 'SELECCIONA UNA TALLA'}
                                            </button>
                                        </div>
                                    </div>

                                    {/* SECCIÓN DE PRODUCTOS RELACIONADOS */}
                                    {relatedProducts.length > 0 && (
                                        <div className="mt-24 pt-10 border-t border-zinc-900">
                                            <h3 className="font-bebas text-3xl md:text-4xl text-white mb-8 tracking-widest flex items-center gap-4">
                                                <span className="w-4 h-4 bg-kuraRed block"></span>
                                                COMPLETA EL LOOK
                                            </h3>
                                            <div className="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-8">
                                                {relatedProducts.map(product => (
                                                    <div key={product.id} className="group cursor-pointer" onClick={() => openProduct(product)}>
                                                        <div className="w-full aspect-square bg-zinc-900 border border-zinc-800 mb-3 overflow-hidden relative">
                                                            <div className="absolute bottom-0 left-0 w-full p-2 bg-gradient-to-t from-black to-transparent z-10">
                                                                <p className="font-bebas text-xl leading-none">{product.title}</p>
                                                                <p className="text-kuraRed font-mono text-xs">NIO {product.price}</p>
                                                            </div>
                                                            <img src={product.image} alt={product.title} className="object-cover w-full h-full md:grayscale group-hover:grayscale-0 transition-all duration-500" />
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* SLIDE-OVER CARRITO */}
                    {isCartOpen && (
                        <div className="fixed inset-0 z-[100] flex justify-end bg-black/80 backdrop-blur-sm">
                            <div className="absolute inset-0 z-0" onClick={() => setIsCartOpen(false)}></div>
                            <div className="h-full w-full md:w-[450px] bg-kuraDark border-l-2 border-kuraRed flex flex-col shadow-[-20px_0_50px_rgba(255,0,60,0.1)] z-10 relative">
                                <div className="p-5 border-b border-zinc-800 flex justify-between items-center bg-black shrink-0">
                                    <h2 className="text-3xl font-bebas text-white tracking-widest">CHECKOUT</h2>
                                    <button onClick={() => setIsCartOpen(false)} className="text-zinc-500 hover:text-kuraRed font-bold text-xl">✕</button>
                                </div>

                                <div className="flex-1 overflow-y-auto no-scrollbar p-5 space-y-3">
                                    {cart.length === 0 ? (
                                        <p className="text-zinc-600 text-center mt-10 font-mono text-sm uppercase">Cero prendas seleccionadas.</p>
                                    ) : (
                                        cart.map(item => (
                                            <div key={item.cartId} className="flex justify-between items-center bg-black p-4 border border-zinc-800">
                                                <div>
                                                    <p className="font-bebas text-xl md:text-2xl leading-none mb-1">{item.title}</p>
                                                    <p className="text-zinc-400 text-[10px] md:text-xs font-mono">TALLA: {item.selectedSize} // NIO {item.price}</p>
                                                </div>
                                                <button onClick={() => removeFromCart(item.cartId)} className="text-kuraRed hover:text-white font-mono text-xl pl-4">✕</button>
                                            </div>
                                        ))
                                    )}
                                </div>

                                <div className="p-5 bg-black border-t border-zinc-800 shrink-0 pb-8 md:pb-5">
                                    <div className="flex justify-between items-end mb-4">
                                        <span className="font-mono text-zinc-400 text-xs md:text-sm">TOTAL ESTIMADO</span>
                                        <span className="font-bebas text-3xl md:text-4xl text-kuraRed leading-none">NIO {totalCart}</span>
                                    </div>
                                    <form onSubmit={handleWhatsAppCheckout} className="space-y-2">
                                        <input required type="text" placeholder="NOMBRE / ALIAS" className="w-full bg-kuraDark border border-zinc-800 text-white p-3 font-mono text-xs focus:outline-none focus:border-kuraRed placeholder:text-zinc-600" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} />
                                        <input required type="tel" placeholder="TELÉFONO" className="w-full bg-kuraDark border border-zinc-800 text-white p-3 font-mono text-xs focus:outline-none focus:border-kuraRed placeholder:text-zinc-600" value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value})} />
                                        <textarea required placeholder="PUNTO DE ENTREGA" className="w-full bg-kuraDark border border-zinc-800 text-white p-3 font-mono text-xs focus:outline-none focus:border-kuraRed placeholder:text-zinc-600 h-16 resize-none" value={formData.address} onChange={(e) => setFormData({...formData, address: e.target.value})} />
                                        <button type="submit" className="w-full bg-white text-black font-bebas text-xl py-3 mt-2 hover:bg-kuraRed hover:text-white transition-colors tracking-widest border border-transparent">
                                            PEDIR POR WHATSAPP
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<KuraStudio />);
    </script>
</body>
</html>
