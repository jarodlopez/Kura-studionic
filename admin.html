<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KURA STUDIO | Backoffice</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { kuraRed: '#ff003c', kuraDark: '#050505' }, fontFamily: { bebas: ['"Bebas Neue"', 'sans-serif'], mono: ['"Space Mono"', 'monospace'] } } } }
    </script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Space Mono', monospace; }
        .brutalist-input { width: 100%; background: #050505; border: 1px solid #333; color: white; padding: 0.75rem; font-size: 0.875rem; margin-top: 0.25rem; outline: none; }
        .brutalist-input:focus { border-color: #ff003c; }
        .brutalist-btn { background: #ff003c; color: black; padding: 0.75rem 1.5rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; cursor: pointer; text-transform: uppercase; border: none; }
        .brutalist-btn:hover { background: white; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyB6YA-gSckDvi-fdFlRsvwRttr3VnGQ82U",
            authDomain: "kuranic-b1034.firebaseapp.com",
            projectId: "kuranic-b1034",
            storageBucket: "kuranic-b1034.firebasestorage.app"
        };
        const IMGBB_API_KEY = "B922654effe3a1ab5ac85cc4c23f97b8";

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const { useState, useEffect, useRef } = React;

        function AdminPanel() {
            const [view, setView] = useState('INVENTORY'); // INVENTORY o DESIGN
            
            // Estados Inventario
            const [products, setProducts] = useState([]);
            const [formData, setFormData] = useState({ title: '', price: '', category: '', description: '', details: '', sizes: [], stock: '', images: [] });
            const [editingId, setEditingId] = useState(null);
            
            // Estados Diseño
            const [storeConfig, setStoreConfig] = useState({ heroSlides: [], sizeGuide: '' });
            const [slideForm, setSlideForm] = useState({ subtitle: '', title: '', cta: '' });
            
            const [isSaving, setIsSaving] = useState(false);

            // Cargar Datos Iniciales
            useEffect(() => {
                fetchProducts();
                fetchStoreConfig();
            }, []);

            const fetchProducts = async () => {
                const snapshot = await db.collection("products").get();
                setProducts(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            };

            const fetchStoreConfig = async () => {
                const doc = await db.collection("settings").doc("store").get();
                if (doc.exists) setStoreConfig(doc.data());
            };

            // Utilidad para subir a ImgBB
            const uploadToImgBB = async (file) => {
                const fd = new FormData();
                fd.append("image", file);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
                const data = await res.json();
                if (data.success) return data.data.url;
                throw new Error("Error subiendo imagen");
            };

            /* === LÓGICA DE INVENTARIO === */
            const handleProductSubmit = async (e) => {
                e.preventDefault(); setIsSaving(true);
                const data = { ...formData, price: Number(formData.price), stock: Number(formData.stock), details: formData.details.split('\n').filter(d=>d) };
                if (editingId) await db.collection("products").doc(editingId).update(data);
                else await db.collection("products").add(data);
                setFormData({ title: '', price: '', category: '', description: '', details: '', sizes: [], stock: '', images: [] });
                setEditingId(null); fetchProducts(); setIsSaving(false);
            };

            const handleProductImage = async (e) => {
                setIsSaving(true);
                for (const file of e.target.files) {
                    const url = await uploadToImgBB(file);
                    setFormData(p => ({ ...p, images: [...p.images, url] }));
                }
                setIsSaving(false);
            };

            /* === LÓGICA DE DISEÑO (PORTADAS Y GUÍA) === */
            const saveStoreConfig = async (newConfig) => {
                await db.collection("settings").doc("store").set(newConfig, { merge: true });
                setStoreConfig(newConfig);
            };

            const handleSizeGuideUpload = async (e) => {
                if(!e.target.files[0]) return;
                setIsSaving(true);
                const url = await uploadToImgBB(e.target.files[0]);
                await saveStoreConfig({ ...storeConfig, sizeGuide: url });
                setIsSaving(false);
            };

            const handleSlideAdd = async (e) => {
                if(!e.target.files[0]) return;
                setIsSaving(true);
                const url = await uploadToImgBB(e.target.files[0]);
                const newSlide = { id: Date.now(), image: url, subtitle: slideForm.subtitle.toUpperCase(), title: slideForm.title.toUpperCase(), cta: slideForm.cta.toUpperCase() || 'VER MÁS' };
                await saveStoreConfig({ ...storeConfig, heroSlides: [...(storeConfig.heroSlides || []), newSlide] });
                setSlideForm({ subtitle: '', title: '', cta: '' });
                setIsSaving(false);
            };

            const removeSlide = async (id) => {
                const newSlides = storeConfig.heroSlides.filter(s => s.id !== id);
                await saveStoreConfig({ ...storeConfig, heroSlides: newSlides });
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* TABS NAVEGACIÓN */}
                    <header className="bg-kuraDark border-b border-zinc-800 p-4 flex gap-4">
                        <button onClick={() => setView('INVENTORY')} className={`font-bebas text-2xl ${view === 'INVENTORY' ? 'text-kuraRed' : 'text-zinc-500'}`}>INVENTARIO DE PRENDAS</button>
                        <button onClick={() => setView('DESIGN')} className={`font-bebas text-2xl ${view === 'DESIGN' ? 'text-kuraRed' : 'text-zinc-500'}`}>PORTADAS Y GUÍA DE TALLAS</button>
                    </header>

                    <div className="flex-1 p-6 max-w-7xl mx-auto w-full">
                        {isSaving && <div className="fixed top-4 right-4 bg-kuraRed text-black font-bebas px-4 py-2 z-50 animate-pulse">GUARDANDO EN SERVIDOR...</div>}

                        {view === 'INVENTORY' ? (
                            <div className="flex flex-col md:flex-row gap-8">
                                {/* FORMULARIO INVENTARIO */}
                                <form onSubmit={handleProductSubmit} className="w-full md:w-1/3 space-y-4 bg-zinc-950 p-6 border border-zinc-800">
                                    <h2 className="font-bebas text-2xl text-kuraRed">NUEVA PRENDA</h2>
                                    <input required placeholder="TÍTULO" className="brutalist-input" value={formData.title} onChange={e=>setFormData({...formData, title: e.target.value.toUpperCase()})} />
                                    <div className="flex gap-2">
                                        <input required type="number" placeholder="PRECIO (NIO)" className="brutalist-input" value={formData.price} onChange={e=>setFormData({...formData, price: e.target.value})} />
                                        <input required placeholder="CATEGORÍA (Ej: T-SHIRT)" className="brutalist-input" value={formData.category} onChange={e=>setFormData({...formData, category: e.target.value.toUpperCase()})} />
                                    </div>
                                    <textarea required placeholder="DESCRIPCIÓN" className="brutalist-input h-16" value={formData.description} onChange={e=>setFormData({...formData, description: e.target.value})} />
                                    <textarea placeholder="DETALLES (UNO POR LÍNEA)" className="brutalist-input h-16" value={formData.details} onChange={e=>setFormData({...formData, details: e.target.value})} />
                                    
                                    <div>
                                        <p className="text-xs text-zinc-500 mb-2">TALLAS</p>
                                        <div className="flex flex-wrap gap-2">
                                            {['S','M','L','XL','XXL'].map(s => (
                                                <button key={s} type="button" onClick={() => setFormData(p => ({...p, sizes: p.sizes.includes(s) ? p.sizes.filter(x=>x!==s) : [...p.sizes, s]}))}
                                                    className={`px-3 py-1 font-bebas border ${formData.sizes.includes(s) ? 'bg-kuraRed text-black' : 'border-zinc-700'}`}>{s}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="border border-zinc-700 p-2">
                                        <p className="text-xs text-zinc-500 mb-2">FOTOS (Sube varias)</p>
                                        <input type="file" multiple onChange={handleProductImage} className="text-xs w-full mb-2" />
                                        <div className="flex gap-2">
                                            {formData.images.map((img, i) => <img key={i} src={img} className="w-10 h-10 object-cover border border-zinc-600" />)}
                                            {formData.images.length > 0 && <button type="button" onClick={()=>setFormData({...formData, images:[]})} className="text-red-500 text-xs">Limpiar fotos</button>}
                                        </div>
                                    </div>
                                    <button type="submit" disabled={isSaving} className="brutalist-btn w-full">GUARDAR PRENDA</button>
                                </form>

                                {/* LISTA INVENTARIO */}
                                <div className="w-full md:w-2/3 grid grid-cols-2 md:grid-cols-3 gap-4 h-max">
                                    {products.map(p => (
                                        <div key={p.id} className="border border-zinc-800 p-2 flex flex-col bg-zinc-950">
                                            <img src={p.images?.[0]} className="w-full h-40 object-cover mb-2" />
                                            <p className="font-bebas text-xl truncate">{p.title}</p>
                                            <p className="text-kuraRed font-mono text-xs mb-2">NIO {p.price}</p>
                                            <button onClick={async () => { await db.collection('products').doc(p.id).delete(); fetchProducts(); }} className="text-xs border border-red-900 text-red-500 py-1 hover:bg-red-900">ELIMINAR</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="flex flex-col md:flex-row gap-8">
                                {/* GESTOR DE PORTADAS (HERO SLIDES) */}
                                <div className="w-full md:w-1/2 border border-zinc-800 p-6 bg-zinc-950">
                                    <h2 className="font-bebas text-3xl text-kuraRed mb-4">AÑADIR PORTADA (HERO SLIDER)</h2>
                                    <div className="space-y-2 mb-4">
                                        <input placeholder="SUBTÍTULO (Ej: NUEVA COLECCIÓN)" className="brutalist-input" value={slideForm.subtitle} onChange={e=>setSlideForm({...slideForm, subtitle: e.target.value})} />
                                        <input placeholder="TÍTULO PRINCIPAL" className="brutalist-input" value={slideForm.title} onChange={e=>setSlideForm({...slideForm, title: e.target.value})} />
                                        <input placeholder="TEXTO DEL BOTÓN (Ej: VER T-SHIRTS)" className="brutalist-input" value={slideForm.cta} onChange={e=>setSlideForm({...slideForm, cta: e.target.value})} />
                                        <div className="pt-2">
                                            <p className="text-xs text-zinc-500 mb-1">SELECCIONA LA IMAGEN DE PORTADA</p>
                                            <input type="file" onChange={handleSlideAdd} className="text-xs border border-zinc-700 p-2 w-full bg-black" />
                                        </div>
                                    </div>
                                    
                                    <h3 className="font-bebas text-xl mt-8 mb-2 border-t border-zinc-800 pt-4">PORTADAS ACTIVAS</h3>
                                    <div className="space-y-2">
                                        {storeConfig.heroSlides?.map(slide => (
                                            <div key={slide.id} className="flex gap-4 border border-zinc-800 p-2 items-center bg-black">
                                                <img src={slide.image} className="w-20 h-10 object-cover" />
                                                <div className="flex-1">
                                                    <p className="font-bebas leading-none">{slide.title}</p>
                                                    <p className="text-[10px] text-zinc-500">{slide.subtitle}</p>
                                                </div>
                                                <button onClick={() => removeSlide(slide.id)} className="text-red-500 font-bold px-2">X</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* GESTOR DE GUÍA DE TALLAS */}
                                <div className="w-full md:w-1/2 border border-zinc-800 p-6 bg-zinc-950 h-max">
                                    <h2 className="font-bebas text-3xl text-kuraRed mb-4">GUÍA DE TALLAS GLOBAL</h2>
                                    <p className="text-xs text-zinc-400 mb-4">Sube una imagen con la tabla de medidas. Aparecerá cuando el cliente toque "Guía de Medidas" al comprar.</p>
                                    <input type="file" onChange={handleSizeGuideUpload} className="text-xs border border-zinc-700 p-2 w-full bg-black mb-4" />
                                    
                                    {storeConfig.sizeGuide ? (
                                        <div className="border border-zinc-800 p-2">
                                            <p className="text-xs text-zinc-500 mb-2">GUÍA ACTUAL:</p>
                                            <img src={storeConfig.sizeGuide} className="w-full h-auto" />
                                        </div>
                                    ) : (
                                        <p className="text-red-500 text-xs">NO HAY GUÍA DE TALLAS CONFIGURADA.</p>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminPanel />);
    </script>
</body>
</html>
