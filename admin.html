<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KURA STUDIO | Backoffice</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { kuraRed: '#ff003c', kuraDark: '#050505' }, 
                    fontFamily: { bebas: ['"Bebas Neue"', 'sans-serif'], mono: ['"Space Mono"', 'monospace'] },
                    animation: { 'slideUp': 'slideUp 0.3s ease-out' }, 
                    keyframes: { slideUp: { '0%': { transform: 'translateY(20px)', opacity: 0 }, '100%': { transform: 'translateY(0)', opacity: 1 } } }
                } 
            } 
        }
    </script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    
    <style>
        body { background-color: #000; color: #fff; font-family: 'Space Mono', monospace; }
        .brutalist-input { width: 100%; background: #050505; border: 1px solid #333; color: white; padding: 0.75rem; font-size: 0.875rem; margin-top: 0.25rem; outline: none; transition: border-color 0.2s; }
        .brutalist-input:focus { border-color: #ff003c; }
        .brutalist-btn { background: #ff003c; color: black; padding: 0.75rem 1.5rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; cursor: pointer; text-transform: uppercase; border: 2px solid #ff003c; transition: all 0.2s; }
        .brutalist-btn:hover { background: #000; color: #ff003c; box-shadow: 4px 4px 0px 0px #ff003c; }
        .brutalist-btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
        .brutalist-btn-outline { background: #000; color: #fff; border: 1px solid #333; transition: all 0.2s ease; font-family: 'Space Mono', monospace; font-size: 0.75rem; font-weight: bold; }
        .brutalist-btn-outline:hover, .brutalist-btn-outline.active { border-color: #ff003c; color: #ff003c; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #000; } ::-webkit-scrollbar-thumb { background: #333; } ::-webkit-scrollbar-thumb:hover { background: #ff003c; }
        .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyB6YA-gSckDvi-fdFlRsvwRttr3VnGQ82U",
            authDomain: "kuranic-b1034.firebaseapp.com",
            projectId: "kuranic-b1034",
            storageBucket: "kuranic-b1034.firebasestorage.app"
        };
        const IMGBB_API_KEY = "B922654effe3a1ab5ac85cc4c23f97b8";

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const auth = firebase.auth();
        const { useState, useEffect } = React;

        function AdminPanel() {
            // Autenticación
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [loginData, setLoginData] = useState({ email: '', password: '' });
            const [loginError, setLoginError] = useState('');

            // Vistas
            const [view, setView] = useState('INVENTORY');
            
            // Estados Inventario
            const [products, setProducts] = useState([]);
            const [inventoryFilter, setInventoryFilter] = useState('TODAS'); // Filtro de inventario
            const [formData, setFormData] = useState({ title: '', sku: '', price: '', discountPrice: '', category: '', description: '', details: '', sizes: [], stock: '', images: [] });
            const [editingId, setEditingId] = useState(null);
            
            // Estados Diseño
            const [storeConfig, setStoreConfig] = useState({ heroSlides: [], sizeGuide: '' });
            const [slideForm, setSlideForm] = useState({ subtitle: '', title: '', cta: '', categoryTarget: '' });
            
            // Estados Órdenes
            const [orders, setOrders] = useState([]);
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [orderSearchQuery, setOrderSearchQuery] = useState('');

            // Estados Descuentos
            const [discountCodes, setDiscountCodes] = useState([]);
            const [codeForm, setCodeForm] = useState({ code: '', type: 'percent', value: '', expiryDate: '', usageLimit: '' });
            const [editingCodeId, setEditingCodeId] = useState(null);

            // Estados Banners Pop-up
            const [popupBanners, setPopupBanners] = useState([]);
            const [bannerForm, setBannerForm] = useState({ title: '', subtitle: '', ctaText: '', active: true, image: '' });
            const [editingBannerId, setEditingBannerId] = useState(null);

            // Estados Analytics
            const [analyticsEvents, setAnalyticsEvents] = useState([]);
            const [analyticsRange, setAnalyticsRange] = useState('7');
            const [analyticsLoading, setAnalyticsLoading] = useState(false);

            const [isSaving, setIsSaving] = useState(false);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    setUser(currentUser);
                    setAuthLoading(false);
                    if (currentUser) {
                        fetchProducts();
                        fetchStoreConfig();
                        fetchOrders();
                        fetchDiscountCodes();
                        fetchPopupBanners();
                        fetchAnalytics();
                    }
                });
                return () => unsubscribe();
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError('');
                setIsSaving(true);
                try {
                    await auth.signInWithEmailAndPassword(loginData.email, loginData.password);
                } catch (error) {
                    setLoginError('Credenciales incorrectas o error de conexión.');
                }
                setIsSaving(false);
            };

            const handleLogout = async () => {
                await auth.signOut();
            };

            const fetchProducts = async () => {
                const snapshot = await db.collection("products").get();
                setProducts(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            };

            const fetchStoreConfig = async () => {
                const doc = await db.collection("settings").doc("store").get();
                if (doc.exists) setStoreConfig(doc.data());
            };

            const fetchOrders = async () => {
                const snapshot = await db.collection("orders").get();
                const fetchedOrders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                fetchedOrders.sort((a, b) => new Date(b.date) - new Date(a.date));
                setOrders(fetchedOrders);
            };

            const fetchDiscountCodes = async () => {
                const snapshot = await db.collection("discountCodes").get();
                setDiscountCodes(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            };

            const fetchPopupBanners = async () => {
                const snapshot = await db.collection("popupBanners").get();
                setPopupBanners(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            };

            const fetchAnalytics = async () => {
                setAnalyticsLoading(true);
                const snapshot = await db.collection("analytics").get();
                setAnalyticsEvents(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                setAnalyticsLoading(false);
            };

            const uploadToImgBB = async (file) => {
                const fd = new FormData();
                fd.append("image", file);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
                const data = await res.json();
                if (data.success) return data.data.url;
                throw new Error("Error subiendo imagen");
            };

            /* === LISTADO DINÁMICO DE CATEGORÍAS === */
            // Extrae categorías únicas de los productos, e incluye la que esté en formData si es nueva
            const uniqueCategories = Array.from(new Set([...products.map(p => p.category), formData.category].filter(Boolean)));

            /* === LÓGICA DE INVENTARIO === */
            const handleProductSubmit = async (e) => {
                e.preventDefault(); setIsSaving(true);
                
                if(!formData.category) {
                    alert("Por favor selecciona o añade una categoría.");
                    setIsSaving(false); return;
                }

                const data = { 
                    ...formData, 
                    price: Number(formData.price), 
                    discountPrice: formData.discountPrice ? Number(formData.discountPrice) : null,
                    stock: Number(formData.stock), 
                    details: formData.details.split('\n').filter(d=>d) 
                };

                if (editingId) await db.collection("products").doc(editingId).update(data);
                else await db.collection("products").add(data);
                
                setFormData({ title: '', sku: '', price: '', discountPrice: '', category: '', description: '', details: '', sizes: [], stock: '', images: [] });
                setEditingId(null); fetchProducts(); setIsSaving(false);
            };

            const handleProductImage = async (e) => {
                setIsSaving(true);
                for (const file of e.target.files) {
                    const url = await uploadToImgBB(file);
                    setFormData(p => ({ ...p, images: [...p.images, url] }));
                }
                setIsSaving(false);
            };

            const filteredInventory = inventoryFilter === 'TODAS' 
                ? products 
                : products.filter(p => p.category === inventoryFilter);

            /* === LÓGICA DE DISEÑO === */
            const saveStoreConfig = async (newConfig) => {
                await db.collection("settings").doc("store").set(newConfig, { merge: true });
                setStoreConfig(newConfig);
            };

            const handleSizeGuideUpload = async (e) => {
                if(!e.target.files[0]) return;
                setIsSaving(true);
                const url = await uploadToImgBB(e.target.files[0]);
                await saveStoreConfig({ ...storeConfig, sizeGuide: url });
                setIsSaving(false);
            };

            const handleSlideAdd = async (e) => {
                if(!e.target.files[0]) return;
                setIsSaving(true);
                const url = await uploadToImgBB(e.target.files[0]);
                const newSlide = { 
                    id: Date.now(), 
                    image: url, 
                    subtitle: slideForm.subtitle.toUpperCase(), 
                    title: slideForm.title.toUpperCase(), 
                    cta: slideForm.cta.toUpperCase() || 'VER COLECCIÓN',
                    categoryTarget: slideForm.categoryTarget // Se asocia la categoría
                };
                await saveStoreConfig({ ...storeConfig, heroSlides: [...(storeConfig.heroSlides || []), newSlide] });
                setSlideForm({ subtitle: '', title: '', cta: '', categoryTarget: '' });
                setIsSaving(false);
            };

            const removeSlide = async (id) => {
                const newSlides = storeConfig.heroSlides.filter(s => s.id !== id);
                await saveStoreConfig({ ...storeConfig, heroSlides: newSlides });
            };

            /* === LÓGICA DE ÓRDENES === */
            const getPrice = (product) => {
                return product.discountPrice && product.discountPrice > 0 ? product.discountPrice : product.price;
            };

            const formatDate = (isoString) => {
                if (!isoString) return 'Fecha desconocida';
                const date = new Date(isoString);
                return date.toLocaleString('es-NI', { dateStyle: 'medium', timeStyle: 'short' });
            };

            // Filtrado del buscador de órdenes
            const filteredOrders = orders.filter(o => {
                const q = orderSearchQuery.toLowerCase();
                return o.orderNumber?.toLowerCase().includes(q) || 
                       o.customer?.name?.toLowerCase().includes(q) || 
                       o.customer?.phone?.toLowerCase().includes(q);
            });

            /* === LÓGICA DE DESCUENTOS === */
            const handleCodeSubmit = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const existing = editingCodeId ? discountCodes.find(c => c.id === editingCodeId) : null;
                const data = {
                    code: codeForm.code.toUpperCase().trim(),
                    type: codeForm.type,
                    value: Number(codeForm.value),
                    expiryDate: codeForm.expiryDate || '',
                    usageLimit: codeForm.usageLimit ? Number(codeForm.usageLimit) : 0,
                    usageCount: existing ? existing.usageCount : 0,
                    active: true,
                    createdAt: existing ? existing.createdAt : new Date().toISOString()
                };
                if (editingCodeId) {
                    await db.collection("discountCodes").doc(editingCodeId).update(data);
                } else {
                    await db.collection("discountCodes").add(data);
                }
                setCodeForm({ code: '', type: 'percent', value: '', expiryDate: '', usageLimit: '' });
                setEditingCodeId(null);
                fetchDiscountCodes();
                setIsSaving(false);
            };

            const deleteCode = async (id) => {
                if (!window.confirm('¿Eliminar este código de descuento?')) return;
                await db.collection("discountCodes").doc(id).delete();
                fetchDiscountCodes();
            };

            const toggleCodeActive = async (id, current) => {
                await db.collection("discountCodes").doc(id).update({ active: !current });
                fetchDiscountCodes();
            };

            /* === LÓGICA DE BANNERS POP-UP === */
            const handleBannerImageUpload = async (e) => {
                if (!e.target.files[0]) return;
                setIsSaving(true);
                const url = await uploadToImgBB(e.target.files[0]);
                setBannerForm(prev => ({ ...prev, image: url }));
                setIsSaving(false);
            };

            const handleBannerSubmit = async (e) => {
                e.preventDefault();
                if (!bannerForm.image) return alert('Sube una imagen para el banner.');
                setIsSaving(true);
                const existing = editingBannerId ? popupBanners.find(b => b.id === editingBannerId) : null;
                const data = {
                    title: bannerForm.title.toUpperCase(),
                    subtitle: bannerForm.subtitle,
                    ctaText: bannerForm.ctaText.toUpperCase(),
                    active: bannerForm.active,
                    image: bannerForm.image,
                    createdAt: existing ? existing.createdAt : new Date().toISOString()
                };
                if (editingBannerId) {
                    await db.collection("popupBanners").doc(editingBannerId).update(data);
                } else {
                    await db.collection("popupBanners").add(data);
                }
                setBannerForm({ title: '', subtitle: '', ctaText: '', active: true, image: '' });
                setEditingBannerId(null);
                fetchPopupBanners();
                setIsSaving(false);
            };

            const deleteBanner = async (id) => {
                if (!window.confirm('¿Eliminar este banner?')) return;
                await db.collection("popupBanners").doc(id).delete();
                fetchPopupBanners();
            };

            const toggleBannerActive = async (id, current) => {
                await db.collection("popupBanners").doc(id).update({ active: !current });
                fetchPopupBanners();
            };

            // === PANTALLA DE CARGA Y LOGIN ===
            if (authLoading) return <div className="min-h-screen bg-black flex justify-center items-center font-bebas text-4xl text-kuraRed animate-pulse">VERIFICANDO SISTEMA...</div>;

            if (!user) {
                return (
                    <div className="min-h-screen bg-black flex justify-center items-center px-4" style={{ backgroundImage: 'linear-gradient(rgba(255, 0, 60, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 0, 60, 0.04) 1px, transparent 1px)', backgroundSize: '40px 40px' }}>
                        <div className="border-2 border-zinc-800 bg-zinc-950 p-8 w-full max-w-md shadow-2xl">
                            <h1 className="font-bebas text-5xl text-kuraRed mb-2 text-center">KURA STUDIO</h1>
                            <p className="text-zinc-500 font-mono text-xs text-center mb-8 uppercase tracking-widest border-b border-zinc-800 pb-4">Terminal de Acceso</p>
                            
                            {loginError && <div className="bg-red-900/50 border border-red-500 text-red-200 text-xs p-3 mb-4 font-mono">{loginError}</div>}
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="text-xs text-zinc-400 font-bold">CORREO ADMINISTRADOR</label>
                                    <input type="email" required className="brutalist-input" value={loginData.email} onChange={e => setLoginData({...loginData, email: e.target.value})} />
                                </div>
                                <div>
                                    <label className="text-xs text-zinc-400 font-bold">CONTRASEÑA</label>
                                    <input type="password" required className="brutalist-input" value={loginData.password} onChange={e => setLoginData({...loginData, password: e.target.value})} />
                                </div>
                                <button type="submit" disabled={isSaving} className="brutalist-btn w-full mt-6">
                                    {isSaving ? 'CONECTANDO...' : 'ENTRAR AL SISTEMA'}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    {/* MODAL DETALLES DE ORDEN */}
                    {selectedOrder && (
                        <div className="fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4 backdrop-blur-sm" onClick={() => setSelectedOrder(null)}>
                            <div className="bg-zinc-950 border border-zinc-800 w-full max-w-4xl max-h-[90vh] overflow-y-auto animate-slideUp flex flex-col md:flex-row shadow-2xl" onClick={e => e.stopPropagation()}>
                                
                                <div className="w-full md:w-1/2 p-6 border-b md:border-b-0 md:border-r border-zinc-800">
                                    <div className="flex justify-between items-start mb-6">
                                        <div>
                                            <h2 className="font-bebas text-4xl text-kuraRed leading-none">ORDEN {selectedOrder.orderNumber}</h2>
                                            <p className="text-zinc-500 text-xs mt-1">{formatDate(selectedOrder.date)}</p>
                                        </div>
                                        <button onClick={() => setSelectedOrder(null)} className="text-zinc-500 hover:text-white font-bold text-xl">✕</button>
                                    </div>

                                    <div className="mb-6 bg-black p-4 border border-zinc-800">
                                        <p className="font-bold text-white mb-2 text-sm border-b border-zinc-800 pb-2">DATOS DEL CLIENTE</p>
                                        <p className="text-sm"><span className="text-zinc-500">Nombre:</span> {selectedOrder.customer?.name}</p>
                                        <p className="text-sm"><span className="text-zinc-500">Teléfono:</span> {selectedOrder.customer?.phone}</p>
                                        <p className="text-sm"><span className="text-zinc-500">Dirección:</span> {selectedOrder.customer?.address}</p>
                                        <p className="text-sm"><span className="text-zinc-500">Zona:</span> <span className="text-kuraRed font-bold">{selectedOrder.shippingZone}</span></p>
                                    </div>

                                    <div>
                                        <p className="font-bold text-white mb-3 text-sm border-b border-zinc-800 pb-2">PRODUCTOS COMPRADOS</p>
                                        <div className="space-y-3">
                                            {selectedOrder.items?.map((item, idx) => (
                                                <div key={idx} className="flex gap-3 bg-black p-2 border border-zinc-900">
                                                    <img src={item.images?.[0]} className="w-12 h-16 object-cover border border-zinc-800" />
                                                    <div className="flex-1">
                                                        <p className="font-bebas text-lg leading-none truncate max-w-[200px]">{item.title}</p>
                                                        <p className="text-[10px] text-zinc-400 font-bold mt-1">TALLA: {item.selectedSize} {item.sku && `| SKU: ${item.sku}`}</p>
                                                        <p className="text-kuraRed font-bold text-xs mt-1">NIO {getPrice(item)}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <div className="mt-6 pt-4 border-t border-zinc-800 space-y-1 text-sm">
                                        <div className="flex justify-between text-zinc-400"><span>Subtotal:</span><span>NIO {selectedOrder.subtotal}</span></div>
                                        <div className="flex justify-between text-zinc-400"><span>Costo de Envío:</span><span>NIO {selectedOrder.shippingCost}</span></div>
                                        <div className="flex justify-between text-white font-bold text-lg pt-2 mt-2 border-t border-zinc-800">
                                            <span>TOTAL PAGADO:</span><span className="text-kuraRed">NIO {selectedOrder.total}</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="w-full md:w-1/2 p-6 flex flex-col bg-zinc-900">
                                    <p className="font-bold text-white mb-3 text-sm border-b border-zinc-800 pb-2">COMPROBANTE DE PAGO</p>
                                    {selectedOrder.receiptUrl ? (
                                        <div className="flex-1 border border-zinc-700 bg-black flex flex-col">
                                            <a href={selectedOrder.receiptUrl} target="_blank" className="flex-1 flex items-center justify-center p-2 hover:opacity-80 transition-opacity">
                                                <img src={selectedOrder.receiptUrl} className="max-h-[50vh] object-contain" />
                                            </a>
                                            <a href={selectedOrder.receiptUrl} target="_blank" className="bg-zinc-800 text-center py-2 text-xs font-bold hover:bg-kuraRed hover:text-black transition-colors block border-t border-zinc-700">
                                                ABRIR IMAGEN COMPLETA ↗
                                            </a>
                                        </div>
                                    ) : (
                                        <div className="flex-1 flex items-center justify-center border border-dashed border-zinc-700 text-zinc-500 text-sm">
                                            Sin comprobante adjunto
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* CABECERA Y NAVEGACIÓN */}
                    <header className="bg-black border-b border-zinc-800 p-4 flex flex-col md:flex-row justify-between items-center gap-4 sticky top-0 z-40">
                        <div className="flex items-center gap-6 overflow-x-auto w-full md:w-auto no-scrollbar">
                            <h1 className="font-bebas text-3xl text-white mr-4">KURA<span className="text-kuraRed">STUDIO</span></h1>
                            <button onClick={() => setView('INVENTORY')} className={`font-bebas text-2xl whitespace-nowrap transition-colors ${view === 'INVENTORY' ? 'text-kuraRed' : 'text-zinc-600 hover:text-white'}`}>INVENTARIO</button>
                            <button onClick={() => setView('DESIGN')} className={`font-bebas text-2xl whitespace-nowrap transition-colors ${view === 'DESIGN' ? 'text-kuraRed' : 'text-zinc-600 hover:text-white'}`}>DISEÑO WEB</button>
                            <button onClick={() => {setView('ORDERS'); fetchOrders();}} className={`font-bebas text-2xl whitespace-nowrap transition-colors flex items-center gap-2 ${view === 'ORDERS' ? 'text-kuraRed' : 'text-zinc-600 hover:text-white'}`}>
                                ÓRDENES <span className="bg-zinc-800 text-white text-xs px-2 py-1 rounded-full">{orders.length}</span>
                            </button>
                            <button onClick={() => {setView('DISCOUNTS'); fetchDiscountCodes();}} className={`font-bebas text-2xl whitespace-nowrap transition-colors ${view === 'DISCOUNTS' ? 'text-kuraRed' : 'text-zinc-600 hover:text-white'}`}>DESCUENTOS</button>
                            <button onClick={() => {setView('BANNERS'); fetchPopupBanners();}} className={`font-bebas text-2xl whitespace-nowrap transition-colors ${view === 'BANNERS' ? 'text-kuraRed' : 'text-zinc-600 hover:text-white'}`}>POP-UPS</button>
                            <button onClick={() => {setView('ANALYTICS'); fetchAnalytics(); fetchOrders();}} className={`font-bebas text-2xl whitespace-nowrap transition-colors ${view === 'ANALYTICS' ? 'text-kuraRed' : 'text-zinc-600 hover:text-white'}`}>ANALYTICS</button>
                        </div>
                        <div className="flex items-center gap-4 w-full md:w-auto justify-end">
                            <span className="text-xs text-zinc-500 font-mono hidden md:inline">{user.email}</span>
                            <button onClick={handleLogout} className="text-xs border border-zinc-700 px-3 py-1 hover:bg-red-900 hover:border-red-500 transition-colors">SALIR</button>
                        </div>
                    </header>

                    <div className="flex-1 p-4 md:p-6 max-w-[1400px] mx-auto w-full">
                        {isSaving && <div className="fixed top-20 right-4 bg-kuraRed text-black font-bebas px-4 py-2 z-50 animate-pulse border-2 border-black shadow-[4px_4px_0_white]">GUARDANDO EN SERVIDOR...</div>}

                        {/* VISTA: INVENTARIO */}
                        {view === 'INVENTORY' && (

                                    <div>
                                        <label className="text-xs text-zinc-400 font-bold">IMAGEN DEL BANNER *</label>
                                        {bannerForm.image && <img src={bannerForm.image} className="w-full h-32 object-cover border border-zinc-800 mb-2 mt-2" />}
                                        <label className={`block w-full text-center py-3 text-xs font-bold cursor-pointer border border-dashed ${isSaving ? 'border-zinc-700 text-zinc-600' : 'border-zinc-600 text-zinc-400 hover:border-kuraRed hover:text-kuraRed'} transition-colors`}>
                                            {isSaving ? 'SUBIENDO...' : (bannerForm.image ? 'CAMBIAR IMAGEN' : '+ SUBIR IMAGEN')}
                                            <input type="file" accept="image/*" className="hidden" onChange={handleBannerImageUpload} disabled={isSaving} />
                                        </label>
                                    </div>

                                    <div>
                                        <label className="text-xs text-zinc-400 font-bold">TÍTULO (opcional)</label>
                                        <input className="brutalist-input" placeholder="NUEVA COLECCIÓN" value={bannerForm.title} onChange={e => setBannerForm({...bannerForm, title: e.target.value})} />
                                    </div>

                                    <div>
                                        <label className="text-xs text-zinc-400 font-bold">SUBTEXTO (opcional)</label>
                                        <input className="brutalist-input" placeholder="Disponible por tiempo limitado" value={bannerForm.subtitle} onChange={e => setBannerForm({...bannerForm, subtitle: e.target.value})} />
                                    </div>

                                    <div>
                                        <label className="text-xs text-zinc-400 font-bold">TEXTO DEL BOTÓN (opcional)</label>
                                        <input className="brutalist-input" placeholder="VER COLECCIÓN" value={bannerForm.ctaText} onChange={e => setBannerForm({...bannerForm, ctaText: e.target.value})} />
                                    </div>

                                    <div className="flex items-center gap-3 border border-zinc-800 p-3">
                                        <span className="text-xs text-zinc-400 font-bold flex-1">MOSTRAR EN TIENDA</span>
                                        <button type="button" onClick={() => setBannerForm(p => ({...p, active: !p.active}))} className={`w-12 h-6 rounded-full transition-colors relative ${bannerForm.active ? 'bg-kuraRed' : 'bg-zinc-700'}`}>
                                            <span className={`absolute top-1 w-4 h-4 rounded-full bg-white transition-transform ${bannerForm.active ? 'translate-x-7' : 'translate-x-1'}`}></span>
                                        </button>
                                    </div>

                                    <button type="submit" disabled={isSaving} className="brutalist-btn w-full">{editingBannerId ? 'ACTUALIZAR BANNER' : 'GUARDAR BANNER'}</button>
                                </form>

                                {/* LISTADO */}
                                <div className="flex-1">
                                    <div className="flex justify-between items-end mb-6 border-b border-zinc-800 pb-4">
                                        <div>
                                            <h2 className="font-bebas text-3xl text-white">BANNERS CREADOS</h2>
                                            <p className="text-zinc-500 text-xs mt-1">Solo se muestra 1 banner activo a la vez (el más reciente)</p>
                                        </div>
                                    </div>

                                    {popupBanners.length === 0 ? (
                                        <div className="text-center py-20 text-zinc-600 font-bebas text-2xl tracking-widest border border-dashed border-zinc-800">NO HAY BANNERS CREADOS</div>
                                    ) : (
                                        <div className="space-y-4">
                                            {popupBanners.map(b => (
                                                <div key={b.id} className={`bg-zinc-950 border flex flex-col md:flex-row gap-4 ${b.active ? 'border-zinc-800' : 'border-zinc-900 opacity-50'}`}>
                                                    <img src={b.image} className="w-full md:w-40 h-32 object-cover shrink-0" />
                                                    <div className="flex flex-col flex-1 p-4 md:pl-0">
                                                        <div className="flex items-center gap-2 mb-1">
                                                            <span className="font-bebas text-xl text-white">{b.title || '(Sin título)'}</span>
                                                            <span className={`text-[10px] font-bold px-2 py-0.5 ${b.active ? 'bg-green-900 text-green-400' : 'bg-zinc-800 text-zinc-500'}`}>{b.active ? 'ACTIVO' : 'INACTIVO'}</span>
                                                        </div>
                                                        {b.subtitle && <p className="text-zinc-500 text-xs mb-1">{b.subtitle}</p>}
                                                        {b.ctaText && <p className="text-kuraRed text-xs font-bold">CTA: {b.ctaText}</p>}
                                                        <div className="flex gap-2 mt-auto pt-3">
                                                            <button onClick={() => toggleBannerActive(b.id, b.active)} className="brutalist-btn-outline px-3 py-2 text-xs">{b.active ? 'DESACTIVAR' : 'ACTIVAR'}</button>
                                                            <button onClick={() => { setEditingBannerId(b.id); setBannerForm({ title: b.title, subtitle: b.subtitle || '', ctaText: b.ctaText, active: b.active, image: b.image }); window.scrollTo({top:0, behavior:'smooth'}); }} className="brutalist-btn-outline px-3 py-2 text-xs">EDITAR</button>
                                                            <button onClick={() => deleteBanner(b.id)} className="px-3 py-2 text-xs border border-zinc-800 text-zinc-500 hover:bg-red-900 hover:text-white hover:border-red-800 transition-colors">✕</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* VISTA: ANALYTICS */}
                        {view === 'ANALYTICS' && (() => {
                            const now = new Date();
                            const days = parseInt(analyticsRange);
                            const rangeStart = new Date(now.getTime() - days * 86400000);
                            const rangeStart1d = new Date(now.getTime() - 86400000);

                            const evts = analyticsEvents.filter(e => new Date(e.timestamp) >= rangeStart);
                            const filteredOrders = orders.filter(o => new Date(o.date) >= rangeStart);

                            // KPIs
                            const totalRevenue = filteredOrders.reduce((s, o) => s + (Number(o.total) || 0), 0);
                            const avgTicket = filteredOrders.length > 0 ? Math.round(totalRevenue / filteredOrders.length) : 0;
                            const pageViews = evts.filter(e => e.type === 'page_view').length;
                            const productViews = evts.filter(e => e.type === 'product_view').length;
                            const cartAdds = evts.filter(e => e.type === 'add_to_cart').length;
                            const checkoutsStarted = evts.filter(e => e.type === 'checkout_started').length;
                            const ordersCompleted = filteredOrders.length;

                            // Funnel conversion rates
                            const funnelSteps = [
                                { label: 'VISITAS', value: pageViews },
                                { label: 'VIO PRODUCTO', value: productViews },
                                { label: 'AL CARRITO', value: cartAdds },
                                { label: 'INICIÓ PAGO', value: checkoutsStarted },
                                { label: 'COMPLETÓ ORDEN', value: ordersCompleted },
                            ];
                            const funnelMax = funnelSteps[0].value || 1;

                            // Daily sales chart data
                            const salesByDay = {};
                            for (let i = days - 1; i >= 0; i--) {
                                const d = new Date(now.getTime() - i * 86400000);
                                const key = d.toISOString().split('T')[0];
                                const label = d.toLocaleDateString('es-NI', { day: '2-digit', month: '2-digit' });
                                salesByDay[key] = { label, orders: 0, revenue: 0 };
                            }
                            filteredOrders.forEach(o => {
                                const day = (o.date || '').split('T')[0];
                                if (salesByDay[day]) { salesByDay[day].orders++; salesByDay[day].revenue += Number(o.total) || 0; }
                            });
                            const chartDays = Object.values(salesByDay);
                            const maxRevenue = Math.max(...chartDays.map(d => d.revenue), 1);

                            // Top products sold
                            const productSales = {};
                            filteredOrders.forEach(o => {
                                (o.items || []).forEach(item => {
                                    const k = item.title || 'Desconocido';
                                    if (!productSales[k]) productSales[k] = { title: k, count: 0, revenue: 0 };
                                    productSales[k].count++;
                                    productSales[k].revenue += Number(item.discountPrice && item.discountPrice > 0 ? item.discountPrice : item.price) || 0;
                                });
                            });
                            const topProducts = Object.values(productSales).sort((a, b) => b.count - a.count).slice(0, 5);
                            const maxCount = topProducts[0]?.count || 1;

                            // Top categorías vistas
                            const catViews = {};
                            evts.filter(e => e.type === 'product_view' && e.category).forEach(e => {
                                catViews[e.category] = (catViews[e.category] || 0) + 1;
                            });
                            const topCats = Object.entries(catViews).sort((a,b) => b[1]-a[1]).slice(0,5);

                            // Shipping zones
                            const managua = filteredOrders.filter(o => o.shippingZone === 'Managua').length;
                            const deptos = filteredOrders.filter(o => o.shippingZone !== 'Managua').length;
                            const zoneTotal = managua + deptos || 1;

                            return (
                                <div className="space-y-8">
                                    {/* HEADER + CONTROLES */}
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-zinc-800 pb-6">
                                        <div>
                                            <h2 className="font-bebas text-4xl text-white">PANEL DE ANALYTICS</h2>
                                            <p className="text-zinc-500 text-xs mt-1">Tráfico, ventas y conversiones en tiempo real</p>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className="text-xs text-zinc-500 font-bold">PERÍODO:</span>
                                            {[['1','HOY'],['7','7 DÍAS'],['30','30 DÍAS']].map(([v,l]) => (
                                                <button key={v} onClick={() => setAnalyticsRange(v)} className={`font-bebas text-lg px-4 py-1 border transition-colors ${analyticsRange === v ? 'bg-kuraRed text-black border-kuraRed' : 'bg-transparent text-zinc-500 border-zinc-700 hover:border-white hover:text-white'}`}>{l}</button>
                                            ))}
                                            <button onClick={() => { fetchAnalytics(); fetchOrders(); }} className="ml-2 text-zinc-500 hover:text-white text-xl" title="Actualizar">↻</button>
                                        </div>
                                    </div>

                                    {analyticsLoading ? (
                                        <div className="text-center py-20 font-bebas text-3xl text-kuraRed animate-pulse">CARGANDO DATOS...</div>
                                    ) : (
                                        <>
                                            {/* KPI CARDS */}
                                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                                                {[
                                                    { label: 'INGRESOS TOTALES', value: `NIO ${totalRevenue.toLocaleString()}`, sub: `${ordersCompleted} órdenes`, color: 'text-kuraRed' },
                                                    { label: 'TICKET PROMEDIO', value: `NIO ${avgTicket.toLocaleString()}`, sub: 'por orden', color: 'text-white' },
                                                    { label: 'VISITAS (SESIONES)', value: pageViews.toLocaleString(), sub: `en ${days} día${days>1?'s':''}`, color: 'text-white' },
                                                    { label: 'TASA DE COMPRA', value: pageViews > 0 ? `${((ordersCompleted / pageViews) * 100).toFixed(1)}%` : '—', sub: 'visita → orden', color: 'text-white' },
                                                ].map((kpi, i) => (
                                                    <div key={i} className="bg-zinc-950 border border-zinc-800 p-5">
                                                        <p className="text-[10px] text-zinc-500 font-bold tracking-widest mb-3 uppercase">{kpi.label}</p>
                                                        <p className={`font-bebas text-4xl ${kpi.color} leading-none mb-1`}>{kpi.value}</p>
                                                        <p className="text-zinc-600 text-xs">{kpi.sub}</p>
                                                    </div>
                                                ))}
                                            </div>

                                            {/* EMBUDO DE CONVERSIÓN */}
                                            <div className="bg-zinc-950 border border-zinc-800 p-6">
                                                <h3 className="font-bebas text-2xl text-white mb-6 flex items-center gap-3"><span className="w-6 h-[2px] bg-kuraRed"></span> EMBUDO DE CONVERSIÓN</h3>
                                                <div className="space-y-3">
                                                    {funnelSteps.map((step, i) => {
                                                        const pct = Math.round((step.value / funnelMax) * 100);
                                                        const dropPct = i > 0 && funnelSteps[i-1].value > 0
                                                            ? ((1 - step.value / funnelSteps[i-1].value) * 100).toFixed(0)
                                                            : null;
                                                        return (
                                                            <div key={i}>
                                                                <div className="flex justify-between items-center mb-1">
                                                                    <div className="flex items-center gap-3">
                                                                        <span className="text-zinc-600 font-mono text-xs w-4">{i+1}</span>
                                                                        <span className="font-bebas text-lg text-white">{step.label}</span>
                                                                        {dropPct !== null && Number(dropPct) > 0 && (
                                                                            <span className="text-[10px] text-red-400 font-mono bg-red-900/20 px-2 py-0.5 border border-red-900">↓ {dropPct}% DROP</span>
                                                                        )}
                                                                    </div>
                                                                    <span className="font-bebas text-xl text-kuraRed">{step.value.toLocaleString()}</span>
                                                                </div>
                                                                <div className="h-6 bg-zinc-900 border border-zinc-800 relative overflow-hidden">
                                                                    <div className="h-full bg-kuraRed transition-all duration-700" style={{width: `${pct}%`, opacity: 1 - i * 0.1}}></div>
                                                                    <span className="absolute right-2 top-1/2 -translate-y-1/2 text-xs text-zinc-500 font-mono">{pct}%</span>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>

                                            {/* GRÁFICA VENTAS DIARIAS */}
                                            <div className="bg-zinc-950 border border-zinc-800 p-6">
                                                <h3 className="font-bebas text-2xl text-white mb-6 flex items-center gap-3"><span className="w-6 h-[2px] bg-kuraRed"></span> VENTAS DIARIAS (NIO)</h3>
                                                {chartDays.every(d => d.revenue === 0) ? (
                                                    <p className="text-zinc-600 text-center py-10 font-bebas text-xl">SIN DATOS DE VENTAS EN ESTE PERÍODO</p>
                                                ) : (
                                                    <div className="flex items-end gap-1 h-40 overflow-x-auto">
                                                        {chartDays.map((d, i) => {
                                                            const barH = Math.max(Math.round((d.revenue / maxRevenue) * 100), d.revenue > 0 ? 4 : 0);
                                                            return (
                                                                <div key={i} className="flex flex-col items-center gap-1 flex-1 min-w-[28px] group cursor-default" title={`${d.label}: NIO ${d.revenue} (${d.orders} órdenes)`}>
                                                                    {d.revenue > 0 && <span className="text-[9px] text-zinc-600 group-hover:text-kuraRed font-mono hidden md:block">{d.orders}</span>}
                                                                    <div className="w-full bg-kuraRed group-hover:bg-white transition-colors" style={{height: `${barH}%`}}></div>
                                                                    <span className="text-[9px] text-zinc-600 group-hover:text-white font-mono">{d.label}</span>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>

                                            {/* BOTTOM ROW: TOP PRODUCTOS + ZONAS + CATEGORÍAS */}
                                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                                {/* TOP PRODUCTOS VENDIDOS */}
                                                <div className="lg:col-span-2 bg-zinc-950 border border-zinc-800 p-6">
                                                    <h3 className="font-bebas text-2xl text-white mb-5 flex items-center gap-3"><span className="w-6 h-[2px] bg-kuraRed"></span> TOP PRODUCTOS VENDIDOS</h3>
                                                    {topProducts.length === 0 ? (
                                                        <p className="text-zinc-600 font-bebas text-xl text-center py-10">SIN VENTAS EN ESTE PERÍODO</p>
                                                    ) : (
                                                        <div className="space-y-3">
                                                            {topProducts.map((p, i) => (
                                                                <div key={i}>
                                                                    <div className="flex justify-between items-center mb-1">
                                                                        <div className="flex items-center gap-2">
                                                                            <span className="text-kuraRed font-bebas text-xl w-5 text-center">{i+1}</span>
                                                                            <span className="text-white text-sm font-mono truncate max-w-[200px]">{p.title}</span>
                                                                        </div>
                                                                        <div className="flex items-center gap-4 shrink-0">
                                                                            <span className="text-zinc-500 text-xs font-mono">NIO {p.revenue.toLocaleString()}</span>
                                                                            <span className="text-kuraRed font-bebas text-lg">{p.count} uds.</span>
                                                                        </div>
                                                                    </div>
                                                                    <div className="h-1.5 bg-zinc-900">
                                                                        <div className="h-full bg-kuraRed" style={{width: `${Math.round((p.count/maxCount)*100)}%`}}></div>
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>

                                                {/* COLUMNA DERECHA */}
                                                <div className="space-y-6">
                                                    {/* ZONAS DE ENVÍO */}
                                                    <div className="bg-zinc-950 border border-zinc-800 p-6">
                                                        <h3 className="font-bebas text-2xl text-white mb-4 flex items-center gap-3"><span className="w-6 h-[2px] bg-kuraRed"></span> ZONAS DE ENVÍO</h3>
                                                        {ordersCompleted === 0 ? (
                                                            <p className="text-zinc-600 font-bebas text-lg text-center py-4">SIN DATOS</p>
                                                        ) : (
                                                            <div className="space-y-3">
                                                                {[['MANAGUA', managua], ['DEPARTAMENTOS', deptos]].map(([label, count]) => (
                                                                    <div key={label}>
                                                                        <div className="flex justify-between text-xs mb-1">
                                                                            <span className="font-mono text-zinc-400">{label}</span>
                                                                            <span className="font-bebas text-white text-lg leading-none">{count} <span className="text-zinc-500 text-xs">({Math.round((count/zoneTotal)*100)}%)</span></span>
                                                                        </div>
                                                                        <div className="h-3 bg-zinc-900">
                                                                            <div className="h-full bg-kuraRed" style={{width: `${Math.round((count/zoneTotal)*100)}%`}}></div>
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>

                                                    {/* CATEGORÍAS MÁS VISTAS */}
                                                    <div className="bg-zinc-950 border border-zinc-800 p-6">
                                                        <h3 className="font-bebas text-2xl text-white mb-4 flex items-center gap-3"><span className="w-6 h-[2px] bg-kuraRed"></span> CATEGORÍAS VISTAS</h3>
                                                        {topCats.length === 0 ? (
                                                            <p className="text-zinc-600 font-bebas text-lg text-center py-4">SIN DATOS</p>
                                                        ) : (
                                                            <div className="space-y-2">
                                                                {topCats.map(([cat, cnt], i) => (
                                                                    <div key={i} className="flex justify-between items-center text-sm">
                                                                        <span className="font-mono text-zinc-400 truncate">{cat}</span>
                                                                        <span className="font-bebas text-kuraRed text-lg ml-2 shrink-0">{cnt}</span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </div>
                            );
                        })()}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminPanel />);
    </script>
</body>
</html>
