<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KURA STUDIO | Backoffice Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { kuraRed: '#ff003c', kuraDark: '#050505', kuraGrey: '#111' },
                    fontFamily: { bebas: ['"Bebas Neue"', 'sans-serif'], mono: ['"Space Mono"', 'monospace'] }
                }
            }
        }
    </script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #000; color: #fff; font-family: 'Space Mono', monospace; overscroll-behavior-y: none; }
        .brutalist-input { width: 100%; background: #050505; border: 1px solid #333; color: white; padding: 0.75rem; font-size: 0.875rem; margin-top: 0.25rem; outline: none; transition: border-color 0.2s; }
        .brutalist-input:focus { border-color: #ff003c; }
        .brutalist-btn { background: #ff003c; color: black; border: none; padding: 0.75rem 1.5rem; font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
        .brutalist-btn:hover:not(:disabled) { background: white; color: black; }
        .brutalist-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        .brutalist-card { border: 1px solid #333; background: #050505; padding: 1rem; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #ff003c; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 1. CONFIGURACIÓN FIREBASE Y IMGBB ---
        const firebaseConfig = {
            apiKey: "AIzaSyB6YA-gSckDvi-fdFlRsvwRttr3VnGQ82U",
            authDomain: "kuranic-b1034.firebaseapp.com",
            projectId: "kuranic-b1034",
            storageBucket: "kuranic-b1034.firebasestorage.app",
            messagingSenderId: "875987360513",
            appId: "1:875987360513:web:cd51507c7b33f302949900"
        };
        
        // API KEY DE IMGBB INTEGRADA
        const IMGBB_API_KEY = "B922654effe3a1ab5ac85cc4c23f97b8";

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        const { useState, useEffect, useRef } = React;

        const AVAILABLE_SIZES = ['S', 'M', 'L', 'XL', 'XXL', 'ÚNICA'];

        function AdminPanel() {
            const [products, setProducts] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const fileInputRef = useRef(null);

            // Estado del Formulario
            const [formData, setFormData] = useState({
                title: '',
                price: '',
                category: '',
                description: '',
                details: '', // Separado por saltos de línea
                sizes: [],
                stock: '',
                images: [] // Array de URLs
            });

            // Cargar Productos
            const fetchProducts = async () => {
                setIsLoading(true);
                try {
                    const snapshot = await db.collection("products").get();
                    const items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setProducts(items);
                } catch (error) {
                    console.error("Error cargando productos", error);
                    alert("Error conectando a la base de datos.");
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => { fetchProducts(); }, []);

            // Manejar Cambios en el Formulario
            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const toggleSize = (size) => {
                setFormData(prev => {
                    const sizes = prev.sizes.includes(size)
                        ? prev.sizes.filter(s => s !== size)
                        : [...prev.sizes, size];
                    return { ...prev, sizes };
                });
            };

            // Eliminar imagen subida
            const removeImage = (index) => {
                setFormData(prev => ({
                    ...prev,
                    images: prev.images.filter((_, i) => i !== index)
                }));
            };

            // Subir Imágenes a ImgBB
            const handleImageUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                
                setIsSaving(true);
                const uploadedUrls = [];

                try {
                    for (const file of files) {
                        const formData = new FormData();
                        formData.append("image", file);
                        
                        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                            method: 'POST',
                            body: formData
                        });
                        
                        const data = await response.json();
                        if (data.success) {
                            uploadedUrls.push(data.data.url);
                        } else {
                            throw new Error(data.error.message);
                        }
                    }

                    setFormData(prev => ({
                        ...prev,
                        images: [...prev.images, ...uploadedUrls]
                    }));
                } catch (error) {
                    console.error("Error subiendo imagen:", error);
                    alert("Error subiendo la imagen a ImgBB. Revisa tu conexión.");
                } finally {
                    setIsSaving(false);
                    if(fileInputRef.current) fileInputRef.current.value = ""; // Limpiar input
                }
            };

            // Guardar o Actualizar Producto en Firestore
            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSaving(true);

                // Preparar datos (convertir texto de detalles a array)
                const productData = {
                    title: formData.title.toUpperCase(),
                    price: Number(formData.price),
                    category: formData.category.toUpperCase(),
                    description: formData.description,
                    details: formData.details.split('\n').filter(d => d.trim() !== ''),
                    sizes: formData.sizes,
                    stock: Number(formData.stock),
                    images: formData.images,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                try {
                    if (editingId) {
                        await db.collection("products").doc(editingId).update(productData);
                        alert("¡Prenda actualizada con éxito!");
                    } else {
                        productData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                        await db.collection("products").add(productData);
                        alert("¡Nueva prenda subida al sistema!");
                    }
                    resetForm();
                    fetchProducts();
                } catch (error) {
                    console.error("Error guardando:", error);
                    alert("Error al guardar en Firebase.");
                } finally {
                    setIsSaving(false);
                }
            };

            // Cargar datos para editar
            const handleEdit = (product) => {
                setEditingId(product.id);
                setFormData({
                    title: product.title,
                    price: product.price,
                    category: product.category,
                    description: product.description,
                    details: product.details ? product.details.join('\n') : '',
                    sizes: product.sizes || [],
                    stock: product.stock || 0,
                    images: product.images || (product.image ? [product.image] : [])
                });
                window.scrollTo(0, 0);
            };

            // Eliminar Producto
            const handleDelete = async (id) => {
                if (window.confirm("¿Seguro que quieres eliminar esta prenda de la existencia?")) {
                    try {
                        await db.collection("products").doc(id).delete();
                        fetchProducts();
                    } catch (error) {
                        alert("Error eliminando.");
                    }
                }
            };

            const resetForm = () => {
                setEditingId(null);
                setFormData({ title: '', price: '', category: '', description: '', details: '', sizes: [], stock: '', images: [] });
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row pb-20 md:pb-0">
                    
                    {/* PANEL IZQUIERDO: FORMULARIO */}
                    <div className="w-full md:w-1/3 bg-kuraDark border-b md:border-b-0 md:border-r border-zinc-800 p-6 md:h-screen md:overflow-y-auto">
                        <div className="mb-8">
                            <p className="text-kuraRed text-xs tracking-widest font-bold">BACKOFFICE SYSTEM</p>
                            <h1 className="text-4xl font-bebas text-white">KURA <span className="text-outline">ADMIN</span></h1>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-xl font-bebas text-kuraRed">{editingId ? 'EDITANDO PRENDA' : 'NUEVA PRENDA'}</h2>
                                {editingId && <button type="button" onClick={resetForm} className="text-xs text-zinc-500 hover:text-white underline">CANCELAR</button>}
                            </div>

                            <div>
                                <label className="text-xs text-zinc-500">TÍTULO DE LA PRENDA</label>
                                <input required type="text" name="title" value={formData.title} onChange={handleChange} className="brutalist-input" placeholder="Ej: TOKYO PUNK TEE" />
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-xs text-zinc-500">PRECIO (NIO)</label>
                                    <input required type="number" name="price" value={formData.price} onChange={handleChange} className="brutalist-input" placeholder="0" />
                                </div>
                                <div>
                                    <label className="text-xs text-zinc-500">STOCK (CANTIDAD)</label>
                                    <input required type="number" name="stock" value={formData.stock} onChange={handleChange} className="brutalist-input" placeholder="0" />
                                </div>
                            </div>

                            <div>
                                <label className="text-xs text-zinc-500">CATEGORÍA</label>
                                <input required type="text" name="category" value={formData.category} onChange={handleChange} className="brutalist-input" placeholder="Ej: T-SHIRTS, HOODIES, PANTS" />
                            </div>

                            <div>
                                <label className="text-xs text-zinc-500">DESCRIPCIÓN COMERCIAL</label>
                                <textarea required name="description" value={formData.description} onChange={handleChange} className="brutalist-input h-20 resize-none" placeholder="Corte oversize japonés..."></textarea>
                            </div>

                            <div>
                                <label className="text-xs text-zinc-500">ESPECIFICACIONES (UNA POR LÍNEA)</label>
                                <textarea name="details" value={formData.details} onChange={handleChange} className="brutalist-input h-20 resize-none" placeholder="100% Algodón&#10;Lavado ácido&#10;Estampado en serigrafía"></textarea>
                            </div>

                            <div>
                                <label className="text-xs text-zinc-500 mb-2 block">TALLAS DISPONIBLES</label>
                                <div className="flex flex-wrap gap-2">
                                    {AVAILABLE_SIZES.map(size => (
                                        <button 
                                            key={size} type="button" 
                                            onClick={() => toggleSize(size)}
                                            className={`px-3 py-1 text-sm border font-bebas transition-colors ${formData.sizes.includes(size) ? 'bg-kuraRed border-kuraRed text-black' : 'bg-transparent border-zinc-700 text-zinc-400'}`}
                                        >
                                            {size}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* GESTIÓN DE IMÁGENES CON IMGBB */}
                            <div className="pt-2 border-t border-zinc-800">
                                <label className="text-xs text-zinc-500 block mb-2">FOTOGRAFÍAS (IMGBB)</label>
                                
                                <input 
                                    type="file" 
                                    accept="image/*" 
                                    multiple 
                                    onChange={handleImageUpload} 
                                    ref={fileInputRef}
                                    className="block w-full text-xs text-zinc-400 file:mr-4 file:py-2 file:px-4 file:rounded-none file:border-0 file:text-xs file:font-bold file:bg-zinc-800 file:text-white hover:file:bg-zinc-700 mb-4 cursor-pointer"
                                />
                                
                                {isSaving && <p className="text-kuraRed text-xs mb-2 animate-pulse">SUBIENDO IMÁGENES AL SERVIDOR...</p>}

                                <div className="flex flex-wrap gap-2">
                                    {formData.images.map((url, idx) => (
                                        <div key={idx} className="relative w-16 h-20 border border-zinc-700 group">
                                            <img src={url} className="w-full h-full object-cover" />
                                            <button type="button" onClick={() => removeImage(idx)} className="absolute top-0 right-0 bg-red-600 text-white w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition-opacity">X</button>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <button type="submit" disabled={isSaving} className="brutalist-btn w-full mt-4">
                                {isSaving ? 'GUARDANDO...' : (editingId ? 'ACTUALIZAR PRENDA' : 'AGREGAR AL CATÁLOGO')}
                            </button>
                        </form>
                    </div>

                    {/* PANEL DERECHO: LISTADO DE PRODUCTOS */}
                    <div className="w-full md:w-2/3 bg-black p-4 md:p-8 md:h-screen md:overflow-y-auto">
                        <div className="flex justify-between items-end mb-6 border-b border-zinc-900 pb-2">
                            <h2 className="text-2xl font-bebas text-white">INVENTARIO ACTUAL ({products.length})</h2>
                            <button onClick={fetchProducts} className="text-xs text-zinc-500 hover:text-white underline">ACTUALIZAR DATOS</button>
                        </div>

                        {isLoading ? (
                            <p className="text-zinc-500 animate-pulse">CARGANDO BASE DE DATOS...</p>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {products.map(product => (
                                    <div key={product.id} className="brutalist-card flex gap-4">
                                        <div className="w-20 h-24 bg-zinc-900 shrink-0 border border-zinc-800">
                                            {product.images && product.images.length > 0 ? (
                                                <img src={product.images[0]} className="w-full h-full object-cover" />
                                            ) : (
                                                <div className="w-full h-full flex items-center justify-center text-[10px] text-zinc-600">NO IMG</div>
                                            )}
                                        </div>
                                        <div className="flex flex-col justify-between w-full">
                                            <div>
                                                <p className="text-xs text-kuraRed mb-1">[{product.category}]</p>
                                                <h3 className="font-bebas text-xl leading-none truncate w-32">{product.title}</h3>
                                                <p className="text-xs text-zinc-500 mt-1">NIO {product.price} | Stock: {product.stock}</p>
                                            </div>
                                            <div className="flex gap-2 mt-2">
                                                <button onClick={() => handleEdit(product)} className="flex-1 bg-zinc-800 text-white text-xs py-1 hover:bg-white hover:text-black transition-colors font-bold">EDITAR</button>
                                                <button onClick={() => handleDelete(product.id)} className="flex-1 bg-red-900/30 text-red-500 text-xs py-1 border border-red-900 hover:bg-red-600 hover:text-white transition-colors font-bold">BORRAR</button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminPanel />);
    </script>
</body>
</html>
